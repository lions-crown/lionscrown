<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試合速報 | L-crown</title>

<link rel="icon" type="image/webp" href="https://lions-crown.homep.jp/img/1766145327164.webp">

<style>

body{
margin:0;
font-family:sans-serif;
background:#0b1d3a;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{text-align:center}

/* スコア */

.scoreboard{
display:flex;
justify-content:center;
gap:40px;
font-size:30px;
margin-bottom:20px;
}

/* イニング表 */

.inning-table{
margin-bottom:20px;
overflow-x:auto;
}

table{
border-collapse:collapse;
width:100%;
background:#12264a;
}

th,td{
border:1px solid rgba(255,255,255,0.1);
padding:6px;
text-align:center;
}

/* 現在打席 */

.current{
background:#132a55;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

/* ダイヤモンド */

.field{
width:120px;
height:120px;
margin:10px auto;
position:relative;
}

.base{
width:20px;
height:20px;
background:#555;
transform:rotate(45deg);
position:absolute;
}

.base.active{background:#ffd700}

.base1{bottom:0;left:50%;transform:translateX(-50%) rotate(45deg)}
.base2{top:0;left:50%;transform:translateX(-50%) rotate(45deg)}
.base3{left:0;top:50%;transform:translateY(-50%) rotate(45deg)}

/* 投球ゾーン */

.zone{
width:200px;
height:200px;
border:2px solid white;
margin:auto;
position:relative;
}

.pitch-dot{
width:8px;
height:8px;
background:red;
border-radius:50%;
position:absolute;
}

/* 打席ログ */

.pa-log{
background:#12264a;
padding:15px;
border-radius:10px;
margin-top:20px;
}

/* 打席移動 */

.pa-nav{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:10px;
}

/* 投球ログ */

.pitch-log{
background:#12264a;
padding:15px;
border-radius:10px;
margin-top:20px;
}

.pitch{
border-bottom:1px solid rgba(255,255,255,0.1);
padding:5px;
}

/* 打席結果ログ */

.pa-results{
background:#12264a;
padding:15px;
border-radius:10px;
margin-top:20px;
max-height:200px;
overflow:auto;
}

/* 実況 */

.live-log{
background:#12264a;
padding:15px;
border-radius:10px;
margin-top:20px;
max-height:250px;
overflow:auto;
font-size:14px;
}

.log{
border-bottom:1px solid rgba(255,255,255,0.1);
padding:4px;
}

button{
background:#1e3a8a;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

button:hover{background:#2563eb}

</style>
</head>

<body>

<div class="container">

<h1>試合速報</h1>

<div class="scoreboard">
<div>Lions <span id="scoreL">0</span></div>
<div>Opponent <span id="scoreO">0</span></div>
</div>

<div class="inning-table">
<table id="inningTable"></table>
</div>

<div class="current">

<div id="inning"></div>
<div id="matchup"></div>
<div id="count"></div>

<div class="field">
<div id="b1" class="base base1"></div>
<div id="b2" class="base base2"></div>
<div id="b3" class="base base3"></div>
</div>

</div>

<h3>投球チャート</h3>
<div class="zone" id="zone"></div>

<div class="pa-log">

<div class="pa-nav">
<button onclick="prevPA()">◀</button>
<div id="paTitle"></div>
<button onclick="nextPA()">▶</button>
</div>

<div id="paLog"></div>

</div>

<div class="pitch-log" id="pitchLog"></div>

<h3>打席結果</h3>
<div class="pa-results" id="paResults"></div>

<h3>実況</h3>
<div class="live-log" id="liveLog"></div>

</div>

<script>

const url="https://opensheet.elk.sh/1E34mPZXcbipFj_78scGueWSu0T4LuIa9DlG4SPsLEac/pitches";

const params=new URLSearchParams(location.search);
const gameId=params.get("game");

let allData=[];
let paList=[];
let currentPA=0;

async function load(){

const res=await fetch(url);
const raw=await res.json();

allData=gameId?raw.filter(d=>d.game_id===gameId):raw;

if(!allData.length)return;

const last=allData[allData.length-1];

scoreL.textContent=last.score_lions;
scoreO.textContent=last.score_opponent;

b1.classList.toggle("active",last.runner_1b);
b2.classList.toggle("active",last.runner_2b);
b3.classList.toggle("active",last.runner_3b);

/* 打席リスト */

paList=[...new Set(allData.map(d=>d.pa_id))];

currentPA=paList.length-1;

renderPA();
renderResults();
renderLive();
renderInning();

}

/* 打席表示 */

function renderPA(){

const paId=paList[currentPA];
const paData=allData.filter(p=>p.pa_id===paId);

const first=paData[0];
const last=paData[paData.length-1];

paTitle.textContent=`${first.innning}回 ${first.top_bottom}`;

inning.textContent=`${first.innning}回 ${first.top_bottom}`;
matchup.textContent=`${first.投手} vs ${first.打者}`;
count.textContent=`B${last.balls} S${last.strikes} O${last.outs}`;

/* 投球ログ */

let log="";
paData.forEach(p=>{
log+=`<div class="pitch">${p.pitch_no}球目 ${p.pitch_type} ${p.velocity}km ${p.pitch_result}</div>`;
});
pitchLog.innerHTML=log;

/* 打席ログ */

let pa="";
paData.forEach(p=>{
pa+=`${p.pitch_type} ${p.pitch_result}<br>`;
});
paLog.innerHTML=pa;

/* 投球チャート */

zone.innerHTML="";

paData.forEach(p=>{

if(!p.zone_x||!p.zone_y)return;

const dot=document.createElement("div");
dot.className="pitch-dot";

dot.style.left=(100+p.zone_x*40)+"px";
dot.style.top=(100-p.zone_y*40)+"px";

zone.appendChild(dot);

});

}

/* 打席結果 */

function renderResults(){

let html="";

paList.forEach(id=>{

const pa=allData.filter(p=>p.pa_id===id);
const last=pa[pa.length-1];

if(!last.pa_result)return;

html+=`<div>${last.innning}回${last.top_bottom} ${last.打者} ${last.pa_result}</div>`;

});

paResults.innerHTML=html;

}

/* 実況 */

function renderLive(){

let html="";

allData.forEach(p=>{

html+=`<div class="log">${p.innning}回${p.top_bottom} ${p.投手}→${p.打者} ${p.pitch_type} ${p.pitch_result}</div>`;

});

liveLog.innerHTML=html;

liveLog.scrollTop=liveLog.scrollHeight;

}

/* イニングスコア */

function renderInning(){

let innings=[...new Set(allData.map(d=>d.innning))];

let html="<tr><th></th>";

innings.forEach(i=>html+=`<th>${i}</th>`);

html+="</tr>";

html+="<tr><th>L</th>";

innings.forEach(i=>{

const rows=allData.filter(d=>d.innning==i);
const last=rows[rows.length-1];

html+=`<td>${last.score_lions}</td>`;

});

html+="</tr>";

html+="<tr><th>O</th>";

innings.forEach(i=>{

const rows=allData.filter(d=>d.innning==i);
const last=rows[rows.length-1];

html+=`<td>${last.score_opponent}</td>`;

});

html+="</tr>";

inningTable.innerHTML=html;

}

/* 打席移動 */

function prevPA(){
if(currentPA>0){
currentPA--;
renderPA();
}
}

function nextPA(){
if(currentPA<paList.length-1){
currentPA++;
renderPA();
}
}

load();

setInterval(load,5000);

</script>

</body>
</html>
