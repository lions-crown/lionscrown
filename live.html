<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試合速報 | L-crown</title>

<link rel="icon" type="image/webp" href="https://lions-crown.homep.jp/img/1766145327164.webp">

<style>

body{
margin:0;
font-family:sans-serif;
background:#0b1d3a;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

/* スコア */

.scoreboard{
display:flex;
justify-content:center;
gap:40px;
font-size:30px;
margin-bottom:20px;
}

/* イニング表 */

.inning-table{
overflow-x:auto;
margin-bottom:20px;
}

table{
border-collapse:collapse;
width:100%;
background:#12264a;
}

th,td{
padding:8px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
}

/* 現在打席 */

.current{
background:#132a55;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

/* ダイヤモンド */

.field{
width:120px;
height:120px;
margin:10px auto;
position:relative;
}

.base{
width:20px;
height:20px;
background:#555;
transform:rotate(45deg);
position:absolute;
}

.base.active{
background:#ffd700;
}

.base1{bottom:0;left:50%;transform:translateX(-50%) rotate(45deg);}
.base2{top:0;left:50%;transform:translateX(-50%) rotate(45deg);}
.base3{left:0;top:50%;transform:translateY(-50%) rotate(45deg);}

/* 投球チャート */

.zone{
width:220px;
height:220px;
border:2px solid white;
margin:auto;
position:relative;
}

.pitch-dot{
width:8px;
height:8px;
background:red;
border-radius:50%;
position:absolute;
}

/* 打席ログ */

.pa-log{
background:#12264a;
padding:15px;
border-radius:10px;
margin-top:20px;
}

/* 投球ログ */

.pitch-log{
background:#12264a;
padding:15px;
border-radius:10px;
margin-top:20px;
max-height:300px;
overflow:auto;
}

.pitch{
border-bottom:1px solid rgba(255,255,255,0.1);
padding:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>試合速報</h1>

<div class="scoreboard">
<div>Lions <span id="scoreL">0</span></div>
<div>Opponent <span id="scoreO">0</span></div>
</div>

<div class="inning-table">
<table id="inningTable"></table>
</div>

<div class="current">

<div id="inning"></div>
<div id="matchup"></div>
<div id="count"></div>

<div class="field">
<div id="b1" class="base base1"></div>
<div id="b2" class="base base2"></div>
<div id="b3" class="base base3"></div>
</div>

</div>

<h3>投球チャート</h3>
<div class="zone" id="zone"></div>

<div class="pa-log" id="paLog"></div>

<div class="pitch-log" id="pitchLog"></div>

</div>

<script>

const url="https://opensheet.elk.sh/1E34mPZXcbipFj_78scGueWSu0T4LuIa9DlG4SPsLEac/pitches";

const params = new URLSearchParams(location.search);
const gameId = params.get("game");

function bool(v){
return v==="1"||v==="true"||v===1||v===true;
}

async function load(){

const res = await fetch(url);
const raw = await res.json();

/* 試合フィルタ */

let data = gameId
 ? raw.filter(d => d.game_id === gameId)
 : raw;

if(!data.length) return;

/* pitch_id順 */

data.sort((a,b)=>Number(a.pitch_id)-Number(b.pitch_id));

const last=data[data.length-1];

/* スコア */

scoreL.textContent=last.score_lions || 0;
scoreO.textContent=last.score_opponent || 0;

/* 現在状況 */

inning.textContent=(last.innning||"-")+"回 "+(last.top_bottom||"");
matchup.textContent=(last.投手||"-")+" vs "+(last.打者||"-");
count.textContent="B"+(last.balls||0)+" S"+(last.strikes||0)+" O"+(last.outs||0);

/* 走者 */

b1.classList.toggle("active",bool(last.runner_1b));
b2.classList.toggle("active",bool(last.runner_2b));
b3.classList.toggle("active",bool(last.runner_3b));

/* イニング表 */

let innings=[...new Set(data.map(d=>d.innning))];

let table="<tr><th></th>";

innings.forEach(i=>{
table+="<th>"+i+"</th>";
});

table+="</tr>";

table+="<tr><td>L</td>";

innings.forEach(i=>{
let p=data.filter(d=>d.innning==i).pop();
table+="<td>"+(p?p.score_lions:"")+"</td>";
});

table+="</tr>";

table+="<tr><td>O</td>";

innings.forEach(i=>{
let p=data.filter(d=>d.innning==i).pop();
table+="<td>"+(p?p.score_opponent:"")+"</td>";
});

table+="</tr>";

inningTable.innerHTML=table;

/* 投球チャート */

zone.innerHTML="";

data.slice(-30).forEach(p=>{

if(!p.zone_x || !p.zone_y) return;

let x=Number(p.zone_x);
let y=Number(p.zone_y);

let dot=document.createElement("div");
dot.className="pitch-dot";

dot.style.left=(x*100+100)+"px";
dot.style.top=(110-(y*100))+"px";

zone.appendChild(dot);

});

/* 打席ログ */

const pa=last.pa_id;
let paData=data.filter(p=>p.pa_id===pa);

let paHtml="<b>現在打席</b><br>";

paData.forEach(p=>{
paHtml+=
(p.pitch_type||"")+
" "+
(p.pitch_result||"")+
"<br>";
});

paLog.innerHTML=paHtml;

/* 投球履歴 */

let logHtml="";

data.slice().reverse().forEach(p=>{

logHtml+=`
<div class="pitch">
${p.innning||""}回 ${p.top_bottom||""}  
${p.pitch_type||""} ${p.velocity||""}km  
結果:${p.pitch_result||""}
</div>
`;

});

pitchLog.innerHTML=logHtml;

}

load();
setInterval(load,5000);

</script>

</body>
</html>
