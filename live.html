<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試合速報 | L-crown</title>

<link rel="icon" type="image/webp" href="https://lions-crown.homep.jp/img/1766145327164.webp">

<style>

body{
margin:0;
font-family:sans-serif;
background:#0b1d3a;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{text-align:center;}

/* スコア */

.scoreboard{
display:flex;
justify-content:center;
gap:40px;
font-size:30px;
margin-bottom:20px;
}

/* イニング表 */

.inning-table{
overflow-x:auto;
margin-bottom:20px;
}

table{
border-collapse:collapse;
width:100%;
background:#12264a;
}

th,td{
padding:8px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
}

/* 現在打席 */

.current{
background:#132a55;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

/* ダイヤモンド */

.field{
width:120px;
height:120px;
margin:10px auto;
position:relative;
}

.base{
width:20px;
height:20px;
background:#555;
transform:rotate(45deg);
position:absolute;
}

.base.active{background:#ffd700;}

.base1{bottom:0;left:50%;transform:translateX(-50%) rotate(45deg);}
.base2{top:0;left:50%;transform:translateX(-50%) rotate(45deg);}
.base3{left:0;top:50%;transform:translateY(-50%) rotate(45deg);}

/* 投球チャート */

.zone{
width:200px;
height:200px;
border:2px solid white;
margin:auto;
position:relative;
}

.pitch-dot{
width:8px;
height:8px;
background:red;
border-radius:50%;
position:absolute;
}

/* 打席ログ */

.pa-log{
background:#12264a;
padding:15px;
border-radius:10px;
margin-top:20px;
}

/* 投球ログ */

.pitch-log{
background:#12264a;
padding:15px;
border-radius:10px;
margin-top:20px;
}

.pitch{
border-bottom:1px solid rgba(255,255,255,0.1);
padding:6px;
}

/* 打席ナビ */

.pa-nav{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
}

button{
background:#1e3a8a;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

</style>
</head>

<body>

<div class="container">

<h1>試合速報</h1>

<div class="scoreboard">
<div>Lions <span id="scoreL">0</span></div>
<div>Opponent <span id="scoreO">0</span></div>
</div>

<div class="current">

<div id="inning"></div>
<div id="matchup"></div>
<div id="count"></div>

<div class="field">
<div id="b1" class="base base1"></div>
<div id="b2" class="base base2"></div>
<div id="b3" class="base base3"></div>
</div>

</div>

<h3>投球チャート</h3>
<div class="zone" id="zone"></div>

<div class="pa-log">

<div class="pa-nav">
<button onclick="prevPA()">◀ 前の打席</button>
<div id="paTitle"></div>
<button onclick="nextPA()">次の打席 ▶</button>
</div>

<div id="paLog"></div>

</div>

<div class="pitch-log" id="pitchLog"></div>

</div>

<script>

const url="https://opensheet.elk.sh/1E34mPZXcbipFj_78scGueWSu0T4LuIa9DlG4SPsLEac/pitches";

const params=new URLSearchParams(location.search);
const gameId=params.get("game");

let allData=[];
let paList=[];
let currentPA=0;

async function load(){

const res=await fetch(url);
const raw=await res.json();

allData=gameId?raw.filter(d=>d.game_id===gameId):raw;

if(!allData.length)return;

/* スコア */

const last=allData[allData.length-1];

scoreL.textContent=last.score_lions;
scoreO.textContent=last.score_opponent;

/* 走者 */

b1.classList.toggle("active",last.runner_1b);
b2.classList.toggle("active",last.runner_2b);
b3.classList.toggle("active",last.runner_3b);

/* 打席リスト */

paList=[...new Set(allData.map(d=>d.pa_id))];

currentPA=paList.length-1;

renderPA();

}

/* 打席表示 */

function renderPA(){

const paId=paList[currentPA];

const paData=allData.filter(p=>p.pa_id===paId);

if(!paData.length)return;

const first=paData[0];
const last=paData[paData.length-1];

paTitle.textContent=`${first.innning}回 ${first.top_bottom} 打席`;

inning.textContent=`${first.innning}回 ${first.top_bottom}`;
matchup.textContent=`${first.投手} vs ${first.打者}`;
count.textContent=`B${last.balls} S${last.strikes} O${last.outs}`;

/* 打席ログ */

let html="";

paData.forEach(p=>{
html+=`${p.pitch_type} ${p.pitch_result}<br>`;
});

paLog.innerHTML=html;

/* 投球ログ */

let log="";

paData.forEach(p=>{
log+=`
<div class="pitch">
${p.pitch_no}球目
${p.pitch_type}
${p.velocity}km
結果:${p.pitch_result}
</div>
`;
});

pitchLog.innerHTML=log;

/* 投球チャート */

zone.innerHTML="";

paData.forEach(p=>{

if(!p.zone_x||!p.zone_y)return;

const dot=document.createElement("div");

dot.className="pitch-dot";

dot.style.left=(100+p.zone_x*40)+"px";
dot.style.top=(100-p.zone_y*40)+"px";

zone.appendChild(dot);

});

}

/* 前後移動 */

function prevPA(){

if(currentPA>0){
currentPA--;
renderPA();
}

}

function nextPA(){

if(currentPA<paList.length-1){
currentPA++;
renderPA();
}

}

load();

setInterval(load,5000);

</script>

</body>
</html>
