}

  -webkit-text-fill-color: transparent;
}
.logo img {
  width: 28px; height: 28px;
  object-fit: contain;
  border-radius: 6px;
  filter: drop-shadow(0 0 8px rgba(77,163,255,0.7));
  transition: 0.3s;
}
.logo:hover img { transform: scale(1.12); }

.menu {
  display: flex;
  gap: 28px;

  font-size: 13.5px;
  font-weight: 500;
  position: relative;
  transition: 0.25s;
}
.menu a::after {

  width: 0; height: 2px;
  background: linear-gradient(90deg, #4da3ff, #7ecbff);
  transition: 0.25s;
}
.menu a:hover, .menu a.active {

.menu a:hover::after, .menu a.active::after { width: 100%; }

main {

}
.glass-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 35px 90px rgba(0,0,0,0.7),

}

  gap: 24px;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));

.player-card {
  background: linear-gradient(145deg, rgba(15,30,75,0.95), rgba(8,18,48,0.95));
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,0.7),

  transition: all 0.35s cubic-bezier(0.23,1,0.32,1);
  position: relative;
}
.player-card:hover {
  transform: translateY(-12px) scale(1.03);
  box-shadow: 0 30px 70px rgba(77,163,255,0.35),

}
.player-photo {
  position: relative;
  height: 160px;
  overflow: hidden;
}
.player-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s;
}
.player-card:hover .player-photo img { transform: scale(1.08); }
.number-badge {
  position: absolute;
  top: 12px; right: 12px;
  background: rgba(0,0,0,0.75);
  color: #fff;
  font-size: 28px;
  font-weight: 900;
  width: 52px; height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  border: 3px solid #4da3ff;
  box-shadow: 0 0 20px rgba(77,163,255,0.8);
  z-index: 2;
  font-family: system-ui;
}
.position {
  position: absolute;
  top: 12px; left: 12px;
  padding: 6px 14px;

  font-size: 13px;
  font-weight: 700;

.position-捕手 { background: #ff4d4d; }
.position-内野手 { background: #32ff6a; }
.position-外野手 { background: #ffd700; }
.player-info {
  padding: 18px 20px 22px;
}
.player-name {
  font-size: 1.35rem;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(90deg, #fff, #a0d0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.player-name a {
  color: inherit;
  text-decoration: none;
}
.player-name a:hover { text-shadow: 0 0 15px rgba(77,163,255,0.7); }
.stats {

  justify-content: space-between;
  font-size: 0.93rem;
  color: #b0d0ff;
  margin-top: 12px;
}
.stats span {
  display: flex;
  align-items: center;
  gap: 6px;
}
/* ====================== コントロール ====================== */
.controls, .range-sliders, .sort-controls {
  margin-bottom: 28px;

  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  justify-content: center;
  align-items: flex-end;
}
.controls select, .controls input {

  font-size: 15.5px;
  border-radius: 8px;
  border: none;

.range-slider { flex: 1; min-width: 260px; }
.search-container { position: relative; flex: 1; min-width: 260px; max-width: 420px; }
.autocomplete-items {

/* ==================== 共通処理 ==================== */

/* ==================== 共通処理 ==================== */
function displayNumber(n) {
  if (n === "00") return "00";        // 00は例外でそのまま
  if (n === "0") return "0";          // 0もそのまま

  // 文字列として先頭の0をすべて除去
  let str = String(n).replace(/^0+/, "");
  
  // 全部0だった場合は「0」に戻す
  if (str === "") return "0";

  return str;
}

function getSelectedYears(){
  return [...document.getElementById("yearSelect").selectedOptions].map(o=>o.value);
}

function collectPlayers(){
  const years=getSelectedYears();
  if(!years.length) return [];
  let all=[];
  years.forEach(y=>{
    if(players[y]){
      players[y].forEach(p=>{
        all.push({...p,ref_year:parseInt(y)});
      });
    }
  });

  const map=new Map();
  all.sort((a,b)=>b.ref_year-a.ref_year);
  all.forEach(p=>{
    if(!map.has(p.name)) map.set(p.name,p);
  });

  return [...map.values()];
}

/* ==================== レンダリング ==================== */

function renderPlayers(){

  let arr=collectPlayers();

  const pos=document.getElementById("positionFilter").value;
  if(pos) arr=arr.filter(p=>p.position===pos);

  const name=document.getElementById("nameSearch").value.trim();
  if(name) arr=arr.filter(p=>p.name.includes(name));

  const nS=parseInt(document.getElementById("numStartInput").value)||0;
  const nE=parseInt(document.getElementById("numEndInput").value)||145;
  arr=arr.filter(p=>{
    const num=parseInt(p.number)||0;
    return num>=nS && num<=nE;
  });

  const aS=parseInt(document.getElementById("ageStartInput").value)||17;
  const aE=parseInt(document.getElementById("ageEndInput").value)||50;
  arr=arr.filter(p=>{
    const age=p.ref_year-p.birth_year;
    return age>=aS && age<=aE;
  });

  const dS=parseInt(document.getElementById("draftStartInput").value)||2010;
  const dE=parseInt(document.getElementById("draftEndInput").value)||2026;
  arr=arr.filter(p=>p.draft>=dS && p.draft<=dE);

  const sort=document.getElementById("sortSelect").value;
  arr.sort((a,b)=>{
    const ageA=a.ref_year-a.birth_year;
    const ageB=b.ref_year-b.birth_year;
    switch(sort){
      case "number_asc": return parseInt(a.number)-parseInt(b.number);
      case "number_desc": return parseInt(b.number)-parseInt(a.number);
      case "age_asc": return ageA-ageB;
      case "age_desc": return ageB-ageA;
      case "draft_asc": return a.draft-b.draft;
      case "draft_desc": return b.draft-a.draft;
      case "name_asc": return a.name.localeCompare(b.name,"ja");
      case "name_desc": return b.name.localeCompare(a.name,"ja");
    }
    return 0;
  });

  const grid=document.getElementById("playerGrid");
  grid.innerHTML="";

  if(!arr.length){
    grid.innerHTML=`<p style="text-align:center;grid-column:1/-1;padding:80px;">該当選手が見つかりませんでした</p>`;
    return;
  }

  arr.forEach(p=>{
    const age=p.ref_year-p.birth_year;

    const card=document.createElement("div");
    card.className="player-card";

    card.innerHTML=`
      <div class="player-photo">
        <img src="${p.photo}" alt="${p.name}">
        <div class="number-badge">${displayNumber(p.number)}</div>
        <span class="position position-${p.position}">${p.position}</span>
      </div>
      <div class="player-info">
        <div class="player-name"><a href="${p.link}">${p.name}</a></div>
        <div class="stats">
          <span>🦁 ドラフト ${p.draft}</span>
          <span>👤 ${age}歳</span>
        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

/* ==================== スライダー（安全版） ==================== */

function safeCreateSlider(id,min,max,start,labelId,sId,eId){

  const slider=document.getElementById(id);
  if(!slider || typeof noUiSlider==="undefined") return;

  noUiSlider.create(slider,{
    start:start,
    connect:true,
    step:1,
    range:{min:min,max:max}
  });

  const sInput=document.getElementById(sId);
  const eInput=document.getElementById(eId);
  const label=document.getElementById(labelId);

  slider.noUiSlider.on("update",function(values){
    const s=Math.round(values[0]);
    const e=Math.round(values[1]);
    label.textContent=s+" – "+e;
    sInput.value=s;
    eInput.value=e;
  });

  slider.noUiSlider.on("change",renderPlayers);

  sInput.addEventListener("input",()=>slider.noUiSlider.set([sInput.value,null]));
  eInput.addEventListener("input",()=>slider.noUiSlider.set([null,eInput.value]));
}

for(let y=2026;y>=2015;y--){
  const opt=document.createElement("option");
  opt.value=y;
  opt.textContent=y+"年";
  if(y===2026||y===2025) opt.selected=true;
  document.getElementById("yearSelect").appendChild(opt);

["yearSelect","positionFilter","sortSelect","nameSearch"].forEach(id=>{
  document.getElementById(id).addEventListener("change",renderPlayers);
});

safeCreateSlider("numSlider",0,145,[0,145],"numRangeLabel","numStartInput","numEndInput");
safeCreateSlider("ageSlider",17,50,[17,50],"ageRangeLabel","ageStartInput","ageEndInput");
safeCreateSlider("draftSlider",2010,2026,[2010,2026],"draftRangeLabel","draftStartInput","draftEndInput");

renderPlayers();
