<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一球速報 | L-crown</title>

<link rel="icon" type="image/webp" href="https://lions-crown.homep.jp/img/1766145327164.webp">
<meta name="theme-color" content="#0f172a">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:"Segoe UI","Noto Sans JP",sans-serif;
  background: radial-gradient(circle at top, #163b80 0%, #091b3d 40%, #050c1f 100%);
  color:white;
  min-height:100vh;
  line-height:1.75;
}

body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background: radial-gradient(circle, rgba(77,163,255,0.25), transparent 70%);
  top:-120px;
  right:-120px;
  filter:blur(40px);
  z-index:-1;
}

/* ===== HEADER ===== */
header{
  position:sticky;
  top:0;
  backdrop-filter:blur(14px);
  background:rgba(10,25,60,0.55);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:1000;
}

nav{
  max-width:1100px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  font-weight:bold;
  font-size:18px;
}

.logo span{
  background:linear-gradient(90deg,#4da3ff,#9ad0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.menu{
  display:flex;
  gap:24px;
}

.menu a{
  color:rgba(255,255,255,0.7);
  text-decoration:none;
  font-size:13px;
}

.menu a:hover{color:white;}

/* ===== MAIN ===== */
main{
  max-width:1100px;
  margin:50px auto;
  padding:0 20px;
}

.glass-card{
  background:rgba(255,255,255,0.06);
  border-radius:22px;
  padding:32px;
  backdrop-filter:blur(16px);
  box-shadow:0 20px 60px rgba(0,0,0,0.55);
  margin-bottom:40px;
}

/* ===== SCOREBOARD ===== */
table{
  width:100%;
  border-collapse:collapse;
  text-align:center;
}

th,td{
  border:1px solid rgba(255,255,255,0.15);
  padding:6px;
}

td.clickable{
  cursor:pointer;
}

td.clickable:hover{
  background:rgba(77,163,255,0.2);
}

/* ===== BASE DISPLAY ===== */
.base-display{
  display:flex;
  gap:10px;
  margin-top:10px;
  font-size:18px;
}

.base.filled{
  color:#ffd600;
}

/* ===== STATS CARD ===== */
.stats-card{
  display:flex;
  gap:20px;
  padding:20px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
}

.stats-card img{
  width:120px;
  border-radius:16px;
}

/* ===== FOOTER ===== */
footer{
  margin-top:100px;
  background:rgba(0,0,0,0.35);
  padding:30px 0;
  text-align:center;
  font-size:12px;
  color:rgba(255,255,255,0.6);
}

/* ===== AUTO BUTTON ===== */
.auto-btn{
  padding:6px 14px;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
  background:#00e676;
  color:black;
}

.auto-btn.off{
  background:#ff5252;
  color:white;
}

</style>
</head>

<body>

<header>
<nav>
  <a href="#" class="logo">
    <img src="https://lions-crown.homep.jp/img/1766145327164.webp" width="26">
    <span>L-crown</span>
  </a>

  <div style="display:flex;gap:20px;align-items:center;">
    <div id="autoToggle" class="auto-btn">AUTO ON</div>
    <button onclick="manualReload()">手動更新</button>
  </div>
</nav>
</header>

<main>

<div class="glass-card">
<h2>試合概要</h2>
<div id="summary"></div>
</div>

<div class="glass-card">
<h2>スコアボード</h2>
<div id="scoreboard"></div>
</div>

<div class="glass-card">
<h2>投球ログ</h2>
<div id="pitchLog"></div>
</div>

<div class="glass-card">
<h2>投手詳細</h2>
<div id="pitcherStats"></div>
</div>

<div class="glass-card">
<h2>打者詳細</h2>
<div id="batterStats"></div>
</div>

</main>

<footer>
  <div class="footer-container">
    <div>
      <div class="footer-logo">L-crown</div>
      <div class="footer-text">
        データをより身近なものへ。<br>
        埼玉西武ライオンズの王座奪還への道のりを追い続ける分析サイト。
      </div>
    </div>
    <div>
      <div class="footer-title">リンク</div>
      <a href="/lionscrown/">ホーム</a><br>
      <a href="/lionscrown/news">お知らせ</a><br>
      <a href="/lionscrown/privacypolicy">利用規約</a><br>
      <a href="/lionscrown/contact">お問い合わせ</a><br>
      <a href="/lionscrown/pagelist">ページ一覧</a>
    </div>
    <div>
      <div class="footer-title">フォロー</div>
      <a href="https://x.com/Lcrown_official" target="_blank">𝕏</a>
    </div>
  </div>
  <div class="footer-bottom">
    © 2026 L-crown. All rights reserved.
  </div>
</footer>

<script>

let gameData=null;
let currentPAIndex=0;
let autoUpdate=true;
let polling=null;

const dataPath="live/2026-03-01_1.json";

/* ===== INIT ===== */
async function init(){
  await fetchData();
  currentPAIndex=gameData.pitches.length-1;
  renderAll();
  startPolling();
}

async function fetchData(){
  const res=await fetch(dataPath+"?t="+Date.now());
  gameData=await res.json();
}

function startPolling(){
  polling=setInterval(async()=>{
    if(!autoUpdate) return;
    await fetchData();
    currentPAIndex=gameData.pitches.length-1;
    renderAll();
  },15000);
}

/* ===== AUTO TOGGLE ===== */
autoToggle.onclick=()=>{
  autoUpdate=!autoUpdate;
  autoToggle.textContent=autoUpdate?"AUTO ON":"AUTO OFF";
  autoToggle.classList.toggle("off",!autoUpdate);
};

function manualReload(){
  fetchData().then(()=>renderAll());
}

/* ===== SUMMARY ===== */
function renderSummary(){
  const m=gameData.meta;
  const t=gameData.scoreboard.total;
  summary.innerHTML=`${m.away} ${t.away.R} - ${t.home.R} ${m.home}`;
}

/* ===== SCOREBOARD LINK ===== */
function renderScoreboard(){
  const sb=gameData.scoreboard;
  let html="<table><tr><th></th>";
  sb.innings.forEach((_,i)=>html+=`<th>${i+1}</th>`);
  html+="</tr>";

  ["away","home"].forEach(team=>{
    html+=`<tr><td>${gameData.meta[team]}</td>`;
    sb.innings.forEach((inning,i)=>{
      html+=`<td class="clickable" onclick="jumpToInning(${i+1})">${inning[team]??""}</td>`;
    });
    html+="</tr>";
  });

  html+="</table>";
  scoreboard.innerHTML=html;
}

function jumpToInning(inning){
  const idx=gameData.pitches.findIndex(p=>p.inning===inning);
  if(idx>=0){
    currentPAIndex=idx;
    renderAll();
  }
}

/* ===== PITCH LOG + BASE ===== */
function renderPitchLog(){
  const pa=gameData.pitches[currentPAIndex];
  let html=`${pa.inning}回 ${pa.half==="top"?"表":"裏"}<br>`;

  pa.pitches.forEach((p,i)=>{
    html+=`${i+1}球目 ${p.pitch_type} (${p.velocity}) → ${p.result}`;
    if(p.landing) html+=` [${p.landing}]`;
    html+="<br>";
  });

  html+=renderBases(pa);
  pitchLog.innerHTML=html;
}

function renderBases(pa){
  const b=pa.bases||{};
  const base=(runner)=>runner?"♦":"♢";
  return `<div class="base-display">
    1塁 <span class="base ${b.first?'filled':''}">${base(b.first)}</span>
    2塁 <span class="base ${b.second?'filled':''}">${base(b.second)}</span>
    3塁 <span class="base ${b.third?'filled':''}">${base(b.third)}</span>
  </div>`;
}

/* ===== STATS ===== */
function renderPitcherStats(){
  const pa=gameData.pitches[currentPAIndex];
  const p=getPlayer(pa.pitcher_id);

  pitcherStats.innerHTML=`
  <div class="stats-card">
    <img src="${p.photo||'https://via.placeholder.com/120'}">
    <div>
      <strong>${p.name}</strong><br>
      ERA: ${p.era||"-"}<br>
      今日の投球数: ${pa.pitches.length}
    </div>
  </div>`;
}

function renderBatterStats(){
  const pa=gameData.pitches[currentPAIndex];
  const b=getPlayer(pa.batter_id);

  batterStats.innerHTML=`
  <div class="stats-card">
    <img src="${b.photo||'https://via.placeholder.com/120'}">
    <div>
      <strong>${b.name}</strong><br>
      打率: ${b.avg||"-"}<br>
      前打席まで: ${b.last_results||"-"}
    </div>
  </div>`;
}

function getPlayer(id){
  return [...gameData.lineups.home,...gameData.lineups.away]
    .find(p=>p.id===id)||{};
}

function renderAll(){
  renderSummary();
  renderScoreboard();
  renderPitchLog();
  renderPitcherStats();
  renderBatterStats();
}

init();

</script>

</body>
</html>
