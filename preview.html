section{margin-bottom:28px;padding:22px;border-radius:18px;background:rgba(255,255,255,0.05);backdrop-filter:blur(14px);}

.dashboard{display:grid;grid-template-columns:1fr 2fr 1fr;gap:24px;}

/* ===== 5x5ゾーン ===== */
.zone{
  display:grid;
  grid-template-columns:repeat(5,60px);
  grid-template-rows:repeat(5,60px);
  gap:6px;
  justify-content:center;
  margin-bottom:16px;

.cell{
  border:1px solid rgba(255,255,255,0.15);

  align-items:center;

.pitch-icon{
  width:34px;height:34px;border-radius:50%;

<style>
/* ===== 追加：投球ゾーンUI ===== */

.zone-grid{
  display:inline-block;
  margin-bottom:20px;
}
.zone-row{
  display:flex;
}

  width:60px;
  height:60px;

  margin:2px;
  color:#000;
}

.green{background:#00c853;}
.yellow{background:#ffd600;}
.blue{background:#2196f3;color:#fff;}
.red{background:#ff3d00;color:#fff;}

.pitch-text-log{
  font-size:13px;
  margin-top:10px;
}
</style>

<script>

/* =========================== */
/* 状態管理 */
/* =========================== */

let gameData=null;
let currentPAIndex=0;
let dataPath="";
let lastHash="";

/* =========================== */
/* 初期化 */
/* =========================== */

async function init(){

const params=new URLSearchParams(location.search);
const date=params.get("date")||"2026-03-01";
const team=params.get("team")||"1";

const basePath=location.pathname.includes("/lionscrown")?"/lionscrown/":"/";
dataPath=`${basePath}live/${date}_${team}.json`;

await loadData();
}

async function loadData(){
try{
const res=await fetch(dataPath+"?t="+Date.now());
const text=await res.text();

const hashBuffer=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(text));
const hashArray=Array.from(new Uint8Array(hashBuffer));
const hashHex=hashArray.map(b=>b.toString(16).padStart(2,"0")).join("");

if(hashHex===lastHash)return;
lastHash=hashHex;

gameData=JSON.parse(text);
currentPAIndex=gameData.pitches.length-1;

renderAll();

}catch(e){
console.error(e);
}
}

/* =========================== */
/* 描画統合 */
/* =========================== */

function renderAll(){
renderSummary();
renderScoreboard();
renderLineups();
renderPitch();
renderPitcher();
renderBatter();
renderFinal();
}

/* =========================== */
/* 投球ゾーン描画 */
/* =========================== */

function renderPitch(){

const pa=gameData.pitches[currentPAIndex];
if(!pa){ pitchLog.innerHTML=""; return; }

let grid=Array(5).fill().map(()=>Array(5).fill(""));

pa.pitches?.forEach((p,i)=>{

const r=p.zone_row ?? 2;
const c=p.zone_col ?? 2;

grid[r][c]+=`
<div class="pitch-dot ${getResultColor(p.result)}">
${getPitchSymbol(p.type, pa.pitcher_hand)}${i+1}
</div>`;
});

let html=`<div class="zone-grid">`;

for(let r=0;r<5;r++){
html+=`<div class="zone-row">`;
for(let c=0;c<5;c++){

let cls=(r>=1&&r<=3&&c>=1&&c<=3)?"zone-cell strike-zone":"zone-cell";

html+=`<div class="${cls}">${grid[r][c]}</div>`;
}
html+=`</div>`;
}

html+=`</div>`;

html+=`<div class="pitch-text-log">`;

pa.pitches?.forEach((p,i)=>{
html+=`${i+1}球目 ｜ ${p.speed||""}km/h ｜ ${p.type} ｜ ${p.result}<br>`;
});

html+=`</div>`;

pitchLog.innerHTML=html;

renderCount(pa);
renderBases(pa);
}

/* =========================== */
/* 球種記号 */
/* =========================== */

function getPitchSymbol(type, hand){

switch(type){

case "fastball": return "●";
case "fork":
case "splitter": return "▼";

case "slider": return hand==="L"?"▶":"◀";
case "shoot": return hand==="L"?"◀":"▶";
case "curve": return hand==="L"?"↘":"↙";

default: return "●";
}
}

/* =========================== */
/* 色判定 */
/* =========================== */

function getResultColor(result){
if(result==="ball") return "green";
if(result==="strike"||result==="foul") return "yellow";
if(result==="hit") return "blue";
if(result==="out") return "red";
return "";
}

/* =========================== */
/* 投手詳細 */
/* =========================== */

function renderPitcher(){

const pa=gameData.pitches[currentPAIndex];
if(!pa) return;

const id=pa.pitcher_id;
const pas=gameData.pitches.filter(p=>p.pitcher_id===id);

let pitchCount=0;
let batters=new Set();
let hits=0;
let runs=0;

pas.forEach(p=>{
pitchCount+=p.pitches?.length||0;
batters.add(p.batter_id);
if(p.result==="hit") hits++;
runs+=p.runs||0;
});

let era=(runs*9/(pas.length||1)).toFixed(2);

pitcherStats.innerHTML=`
<div class="player-card">
<div>
<strong>${getName(id)}</strong><br>
投球数: ${pitchCount}<br>
対戦打者数: ${batters.size}<br>
被安打: ${hits}<br>
失点: ${runs}<br>
防御率: ${era}
</div>
</div>`;
}

/* =========================== */
/* 打者詳細 */
/* =========================== */

function renderBatter(){

const pa=gameData.pitches[currentPAIndex];
if(!pa) return;

const id=pa.batter_id;
const pas=gameData.pitches.filter(p=>p.batter_id===id);

let hits=pas.filter(p=>p.result==="hit").length;
let atbats=pas.length;
let avg=atbats?(hits/atbats).toFixed(3):".000";

let history=pas.slice(0,pas.length-1).map(p=>p.result).join(" ｜ ");

batterStats.innerHTML=`
<div class="player-card">
<div>
<strong>${getName(id)}</strong><br>
打率: ${avg}<br>
過去打席: ${history||"なし"}
</div>
</div>`;
}

/* =========================== */
/* ラインナップ修正 */
/* =========================== */

function renderTeam(side){
const lineup=gameData.lineups[side]||[];
const container=document.getElementById(side+"Lineup");

container.innerHTML="";

lineup.filter(p=>p.pos!=="P").forEach((p,i)=>{
container.innerHTML+=`<div class="lineup-item">${i+1} ${p.pos} ${p.name}</div>`;
});

const pitcher=lineup.find(p=>p.pos==="P");
if(pitcher){
container.innerHTML+=`<div class="lineup-item">投手 ${pitcher.name}</div>`;
}
}

/* =========================== */

init();

</script>
