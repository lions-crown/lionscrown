<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一球速報 | L-crown</title>

<link rel="icon" type="image/webp" href="https://lions-crown.homep.jp/img/1766145327164.webp">
<meta name="theme-color" content="#0f172a">

<style>
/* ===== 既存デザイン維持 ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Segoe UI","Noto Sans JP",sans-serif;
  background: radial-gradient(circle at top, #163b80 0%, #091b3d 40%, #050c1f 100%);
  color:white;
  min-height:100vh;
  line-height:1.7;
}
header{position:sticky;top:0;backdrop-filter:blur(14px);background:rgba(10,25,60,0.55);border-bottom:1px solid rgba(255,255,255,0.08);z-index:1000;}
nav{max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:bold;font-size:18px;letter-spacing:1px;text-decoration:none;color:white;}
.logo span{background:linear-gradient(90deg,#4da3ff,#9ad0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo img{width:26px;height:26px;border-radius:6px;filter:drop-shadow(0 0 6px rgba(77,163,255,0.6));}
.menu{display:flex;gap:24px;}
.menu a{color:rgba(255,255,255,0.7);text-decoration:none;font-size:13px;position:relative;transition:0.25s;}
.menu a:hover{color:white;}

main{max-width:1200px;margin:40px auto;padding:0 20px;}
section{margin-bottom:28px;padding:22px;border-radius:18px;background:rgba(255,255,255,0.05);backdrop-filter:blur(14px);}
h1{margin-bottom:20px;}
h2{margin-bottom:14px;}

.dashboard{display:grid;grid-template-columns:1fr 2fr 1fr;gap:24px;}
@media(max-width:1000px){.dashboard{grid-template-columns:1fr;}}

/* ===== 5x5ゾーン ===== */
.zone{
  display:grid;
  grid-template-columns:repeat(5,60px);
  grid-template-rows:repeat(5,60px);
  gap:6px;
  justify-content:center;
  margin-bottom:16px;
}
.cell{
  border:1px solid rgba(255,255,255,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  position:relative;
  font-size:14px;
}
.strikezone{background:rgba(77,163,255,0.15);}

.pitch-icon{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:14px;color:#000;
}
.ball-color{background:#00c853;}
.strike-color{background:#ffd600;}
.hit-color{background:#2196f3;color:#fff;}
.out-color{background:#ff3d00;color:#fff;}

.pitch-text{
  font-size:13px;
  margin-bottom:4px;
}

/* ===== player card ===== */
.player-card{font-size:14px;line-height:1.8;}

footer{margin-top:100px;background:rgba(0,0,0,0.35);backdrop-filter:blur(16px);text-align:center;padding:20px 0;}
footer a{text-decoration:none;color:#7ecbff;}
footer a:hover{color:white;}

</style>
</head>
<body>

<header>
<nav>
<a href="/" class="logo"><img src="https://lions-crown.homep.jp/img/1766145327164.webp"><span>L-crown</span></a>
<div class="menu">
<a href="/lionscrown/">ホーム</a>
<a href="/lionscrown/news">お知らせ</a>
<a href="/lionscrown/privacypolicy">利用規約</a>
<a href="/lionscrown/contact">お問い合わせ</a>
</div>
<button onclick="location.reload()" style="background:#ffcc00;color:black;padding:6px 14px;border-radius:16px;font-weight:bold;">更新</button>
</nav>
</header>

<main>
<h1>一球速報</h1>

<section id="summary"></section>

<div class="dashboard">

<section>
<h2>ホーム</h2>
<div id="homeLineup"></div>
</section>

<section>
<h2>投球ログ</h2>
<div id="zoneContainer"></div>
<div id="pitchTexts"></div>
</section>

<section>
<h2>ビジター</h2>
<div id="awayLineup"></div>
</section>

</div>

<section>
<h2>投手詳細</h2>
<div id="pitcherStats"></div>
</section>

<section>
<h2>打者詳細</h2>
<div id="batterStats"></div>
</section>

</main>

<script>

let gameData=null;
let currentPAIndex=0;

async function init(){
const res=await fetch("live/2026-03-01_1.json");
gameData=await res.json();
currentPAIndex=gameData.pitches.length-1;
renderAll();
}

function renderAll(){
renderZone();
renderPitcher();
renderBatter();
}

/* ===== 球種記号 ===== */
function getSymbol(type,hand){
switch(type){
case "fastball": return "●";
case "fork": return "▼";
case "slider": return hand==="R"?"◀":"▶";
case "shoot": return hand==="R"?"▶":"◀";
case "curve": return hand==="R"?"↙":"↘";
default:return "●";
}
}

function getColor(result){
if(result==="ball")return "ball-color";
if(result==="strike"||result==="foul")return "strike-color";
if(result==="hit")return "hit-color";
if(result==="out")return "out-color";
return "";
}

/* ===== 5x5表示 ===== */
function renderZone(){
const pa=gameData.pitches[currentPAIndex];
let html=`<div class="zone">`;

for(let r=0;r<5;r++){
for(let c=0;c<5;c++){
const isStrike=(r>=1&&r<=3&&c>=1&&c<=3);
html+=`<div class="cell ${isStrike?"strikezone":""}" id="cell-${r}-${c}"></div>`;
}
}
html+="</div>";
zoneContainer.innerHTML=html;

/* 配置 */
pa.pitches.forEach((p,i)=>{
if(p.row===undefined||p.col===undefined)return;
const cell=document.getElementById(`cell-${p.row}-${p.col}`);
if(!cell)return;

const icon=document.createElement("div");
icon.className="pitch-icon "+getColor(p.result);
icon.innerText=getSymbol(p.type,p.hand)+(i+1);
cell.appendChild(icon);
});

/* テキスト */
let text="";
pa.pitches.forEach((p,i)=>{
text+=`<div class="pitch-text">${i+1}球目 ${p.speed||""}km/h ${p.type} ${p.result}</div>`;
});
pitchTexts.innerHTML=text;
}

/* ===== 投手詳細 ===== */
function renderPitcher(){
const pa=gameData.pitches[currentPAIndex];
const id=pa.pitcher_id;

let totalPitches=0;
let batters=new Set();
let hits=0;
let runs=0;

gameData.pitches.forEach(p=>{
if(p.pitcher_id===id){
batters.add(p.batter_id);
totalPitches+=p.pitches.length;
if(p.result==="hit")hits++;
if(p.rbi)runs+=p.rbi;
}
});

let innings=(batters.size/3).toFixed(1);
let era=innings>0?(runs*9/innings).toFixed(2):"0.00";

pitcherStats.innerHTML=`
<div class="player-card">
投球数: ${totalPitches}<br>
対戦打者数: ${batters.size}<br>
被安打: ${hits}<br>
失点: ${runs}<br>
防御率: ${era}
</div>`;
}

/* ===== 打者詳細 ===== */
function renderBatter(){
const pa=gameData.pitches[currentPAIndex];
const id=pa.batter_id;

let ab=0;
let hit=0;
let history="";

gameData.pitches.forEach(p=>{
if(p.batter_id===id){
if(p.result){
ab++;
history+=p.result+" ";
if(p.result==="hit")hit++;
}
}
});

let avg=ab>0?(hit/ab).toFixed(3):".000";

batterStats.innerHTML=`
<div class="player-card">
打率: ${avg}<br>
本日の結果: ${history}
</div>`;
}

init();
</script>

<footer>
© 2026 L-crown. All rights reserved.
</footer>

</body>
</html>
