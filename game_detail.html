<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>一球速報</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/game.js"></script>
</head>
<body>
<div class="game-detail">

<h1>一球速報</h1>

<!-- 試合概要 -->
<section>
  <h2>試合概要</h2>
  <div id="summary"></div>
</section>

<!-- スコアボード -->
<section>
  <h2>スコアボード</h2>
  <div id="scoreboard"></div>
</section>

<!-- オーダー -->
<section>
  <h2>オーダー</h2>
  <div class="lineups">
    <div>
      <h3>ホーム</h3>
      <div id="homeLineup"></div>
    </div>
    <div>
      <h3>ビジター</h3>
      <div id="awayLineup"></div>
    </div>
  </div>
</section>

<!-- 守備位置＋塁状況 -->
<section>
  <h2>守備配置・走者状況</h2>
  <div id="field"></div>
</section>

<!-- 投球ログ -->
<section>
  <h2>投球ログ</h2>
  <div>
    <button onclick="prevPA()">前打者</button>
    <button onclick="nextPA()">次打者</button>
  </div>
  <div id="zone"></div>
</section>

<!-- 投球検索 -->
<section>
  <h2>投球検索</h2>
  <select id="inningFilter"></select>
  <select id="batterFilter"></select>
  <button onclick="filterPitches()">検索</button>
  <div id="filterResult"></div>
</section>

<!-- 投手詳細 -->
<section>
  <h2>投手詳細</h2>
  <div id="pitcherStats"></div>
</section>

<!-- 打者詳細 -->
<section>
  <h2>打者詳細</h2>
  <div id="batterStats"></div>
</section>

<script src="js/game.js"></script>
</div>
</body>
</html>
