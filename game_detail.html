<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一球速報 | L-crown</title>

<link rel="icon" type="image/webp" href="https://lions-crown.homep.jp/img/1766145327164.webp">
<link rel="apple-touch-icon" href="https://lions-crown.homep.jp/img/1766145327164.webp">
<meta name="theme-color" content="#0f172a">

<style>
/* ============================= */
/* 共通リセット・背景・フォント */
/* ============================= */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Segoe UI","Noto Sans JP",sans-serif;
  background: radial-gradient(circle at top, #163b80 0%, #091b3d 40%, #050c1f 100%);
  color:white;
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.75;
}
body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background: radial-gradient(circle, rgba(77,163,255,0.25), transparent 70%);
  top:-120px;
  right:-120px;
  filter:blur(40px);
  z-index:-1;
}

/* ============================= */
/* ヘッダー・メニュー */
/* ============================= */
header{
  position:sticky;
  top:0;
  backdrop-filter:blur(14px);
  background:rgba(10,25,60,0.55);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:1000;
}
nav{
  max-width:1200px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 24px;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  font-size:18px;
  letter-spacing:1px;
  text-decoration:none;
  color:white;
}
.logo span{
  background:linear-gradient(90deg,#4da3ff,#9ad0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.logo img{
  width:26px;
  height:26px;
  border-radius:6px;
  filter:drop-shadow(0 0 6px rgba(77,163,255,0.6));
}
.menu{
  display:flex;
  gap:24px;
}
.menu a{
  color:rgba(255,255,255,0.7);
  text-decoration:none;
  font-size:13px;
  position:relative;
  transition:0.25s;
}
.menu a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-6px;
  width:0;
  height:2px;
  background:linear-gradient(90deg,#4da3ff,#7ecbff);
  transition:0.25s;
}
.menu a:hover{
  color:white;
}
.menu a:hover::after{
  width:100%;
}
footer{
  margin-top:100px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,0.08);
}
.footer-container{
  max-width:1100px;
  margin:auto;
  padding:50px 20px;
  display:grid;
  grid-template-columns:1.6fr 1fr 0.6fr;
  gap:50px;
}
.footer-logo{
  font-size:18px;
  font-weight:bold;
  margin-bottom:12px;
  background:linear-gradient(90deg,#4da3ff,#9ad0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.footer-text{
  font-size:12px;
  color:rgba(255,255,255,0.55);
  line-height:1.7;
}
.footer-title{
  font-size:12px;
  margin-bottom:14px;
  color:rgba(255,255,255,0.9);
}
footer a{
  text-decoration:none;
  font-size:12px;
  color:rgba(255,255,255,0.55);
  transition:0.25s;
}
footer a:hover{
  color:white;
  transform:translateX(4px);
  text-shadow:0 0 8px rgba(77,163,255,0.5);
}
.footer-bottom{
  text-align:center;
  padding:16px;
  font-size:11px;
  color:rgba(255,255,255,0.35);
  border-top:1px solid rgba(255,255,255,0.05);
}
@media(max-width:768px){
  .footer-container{
    grid-template-columns:1fr;
    gap:30px;
  }
}


/* ============================= */
/* 本文・カード */
main{
  max-width:1200px;
  margin:50px auto;
  padding:0 20px;
}
section{
  margin-bottom:30px;
  padding:24px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(14px);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}
h1{margin-bottom:20px;font-size:26px;}
h2{margin-bottom:14px;font-size:18px;}
/* =============================
   プロ仕様スコアボード
============================= */

#scoreboard{
  margin-bottom:20px;
  padding:0;
  background:none;
}

.scoreboard-wrapper{
  width:100%;
  overflow-x:auto;
}

.scoreboard-table{
  width:100%;
  min-width:900px;
  border-collapse:collapse;
  font-size:14px;
  text-align:center;
}

.scoreboard-table th,
.scoreboard-table td{
  border:1px solid rgba(255,255,255,0.15);
  padding:8px 10px;
}

.scoreboard-table thead{
  background:rgba(255,255,255,0.08);
}

.scoreboard-team{
  text-align:left;
  font-weight:600;
  padding-left:14px;
  width:160px;
}

.scoreboard-total{
  background:rgba(77,163,255,0.25);
  font-weight:bold;
}

.scoreboard-table tbody tr:hover{
  background:rgba(255,255,255,0.06);
}

.count-board{
  display:flex;
  align-items:center;
  gap:6px;
  font-weight:600;
  font-size:14px;
}

.count-dot{
  width:14px;
  height:14px;
  border-radius:50%;
  background:#333;
  box-shadow: inset 0 0 6px #000;
}

.count-on.ball{
  background:#00c853;
  box-shadow:0 0 8px #00c853;
}

.count-on.strike{
  background:#ffd600;
  box-shadow:0 0 8px #ffd600;
}

.count-on.out{
  background:#ff3d00;
  box-shadow:0 0 8px #ff3d00;
}

/* ===== Current Inning Highlight ===== */
.scoreboard-table th.current-inning,
.scoreboard-table td.current-inning{
  background:linear-gradient(135deg,#4da3ff,#1e40af);
  color:white;
  font-weight:700;
  box-shadow:0 0 15px rgba(77,163,255,0.6);
  animation: inningGlow 1.2s ease-in-out infinite alternate;
}

@keyframes inningGlow{
  from{box-shadow:0 0 10px rgba(77,163,255,0.4);}
  to{box-shadow:0 0 20px rgba(77,163,255,0.9);}
}
  
.dashboard{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  gap:30px;
  align-items:start;
}
.lineup-box{
  padding:20px;
  border-radius:18px;
  background:rgba(255,255,255,0.04);
}
.lineup-list{display:flex;flex-direction:column;gap:8px;}
.lineup-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 12px;
  border-radius:10px;
  background: rgba(255,255,255,0.06);
  transition:0.2s;
}
.lineup-item:hover{
  background: rgba(255,255,255,0.15);
  transform: translateX(4px);
}
.center-panel{display:flex;flex-direction:column;gap:20px;}
#zone{
  position:relative;
  width:340px;
  height:340px;
  border:2px solid white;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(5,1fr);
}
#zone div{border:1px solid #333; position:relative;}
#zone div.strikeZone{border:1px solid #aaa;}
.pitchMarker{
  position:absolute;width:18px;height:18px;font-size:9px;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);border:1px solid black;
}
#zone{
  background:rgba(255,255,255,0.03);
}

.zone-cell{
  border:1px solid rgba(255,255,255,0.08);
}

.strike-zone{
  background:rgba(77,163,255,0.18);
  border:1px solid rgba(77,163,255,0.6);
}
.result-strike{background:yellow;color:black;}
.result-ball{background:green;color:white;}
.result-hit{background:red;color:white;}
.result-out{background:gray;color:white;}
button{
  padding:8px 18px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:linear-gradient(90deg,#4da3ff,#7ecbff);
  color:black;
  font-weight:bold;
  transition:0.25s;
}
button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,0.5);
}
@media(max-width:1000px){
  .dashboard{grid-template-columns:1fr;}
}

/* ===== Hero Summary ===== */
.hero-summary{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:28px;
  border-radius:22px;
  background:linear-gradient(135deg,rgba(77,163,255,0.18),rgba(0,0,0,0.4));
  backdrop-filter:blur(18px);
  box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

.hero-teams{
  font-size:28px;
  font-weight:700;
  letter-spacing:1px;
}

.hero-meta{
  font-size:14px;
  opacity:.8;
  margin-top:6px;
}

.hero-score{
  font-size:42px;
  font-weight:800;
  background:linear-gradient(90deg,#4da3ff,#9ad0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ============================= */
/* フッター */
footer{
  margin-top:100px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,0.08);
  text-align:center;
  padding:20px 0;
}
footer a{text-decoration:none;color:#7ecbff;}
footer a:hover{color:white;}
</style>
</head>
<body>

<header>
  <nav>
    <a href="/" class="logo"><img src="https://lions-crown.homep.jp/img/1766145327164.webp" alt="L-crown icon"><span>L-crown</span></a>
    <div class="menu">
      <a href="/lionscrown/">ホーム</a>
      <a href="/lionscrown/news">お知らせ</a>
      <a href="/lionscrown/privacypolicy">利用規約</a>
      <a href="/lionscrown/contact">お問い合わせ</a>
    </div>
    <button onclick="location.reload()" style="
      background:#ffcc00;
      color:black;
      padding:6px 14px;
      border-radius:16px;
      font-weight:bold;
      margin-left:20px;">
      更新
    </button>
  </nav>
</header>

<main>
<h1>一球速報</h1>

<section>
  <h2>試合概要</h2>
  <div id="summary"></div>
</section>

<section>
  <h2>スコアボード</h2>
  <div id="scoreboard"></div>
</section>

<div class="dashboard">
  <section class="lineup-box">
    <h2>ホーム</h2>
    <div id="homeLineup"></div>
  </section>

  <section class="center-panel">
    <h2>投球ログ</h2>
    <input type="text" id="searchBatter" placeholder="選手名で検索">
    <button onclick="searchBatter()">検索</button>
    <button onclick="latestPA()">最新に戻る</button>
    <div id="pitchLog"></div>
    <div id="countDisplay"></div>
    <div>
      <button onclick="prevPA()">前打者</button>
      <button onclick="nextPA()">次打者</button>
    </div>
    <div id="zone"></div>
    <div id="field" style="position:relative;height:240px;"></div>
  </section>

  <section class="lineup-box">
    <h2>ビジター</h2>
    <div id="awayLineup"></div>
  </section>
</div>

<section>
  <h2>投手詳細</h2>
  <div id="pitcherStats"></div>
</section>

<section>
  <h2>打者詳細</h2>
  <div id="batterStats"></div>
</section>
</main>

<script>
/* ===========================
   L-crown Pro Live Engine
   GitHub Pages Compatible
=========================== */

let gameData = null;
let currentPAIndex = 0;
let currentFielders = null;

let lastDataHash = "";
let pollingInterval = null;
let dataPath = "";

/* ===========================
   初期化
=========================== */
async function init() {

  // URLパラメータ取得
  const params = new URLSearchParams(window.location.search);
  const date = params.get("date") || "2026-03-01";
  const team = params.get("team") || "1";

  // GitHub Pages対応ベースパス
  const basePath = location.pathname.includes("/lionscrown")
    ? "/lionscrown/"
    : "/";

  // JSONパス確定
  dataPath = `${basePath}live/${date}_${team}.json`;

  // 初回取得
  const updated = await fetchGameData();

  if (updated) {
    currentPAIndex = gameData.pitches.length - 1;
    renderAll();
  } else {
    showError("データ取得失敗");
    return;
  }

  // ポーリング開始
  startPolling();
}

async function fetchGameData() {
  try {
    const res = await fetch(dataPath + "?t=" + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const text = await res.text();
    const newHash = await crypto.subtle.digest(
      "SHA-256",
      new TextEncoder().encode(text)
    );

    if (newHash === lastDataHash) {
      return false; // 更新なし
    }

    lastDataHash = newHash;
    gameData = JSON.parse(text);

    if (!gameData?.pitches?.length) {
      throw new Error("投球データが存在しません");
    }

    return true;

  } catch (err) {
    console.error("データ取得失敗:", err);
    return false;
  }
}

function startPolling() {

  if (pollingInterval) clearInterval(pollingInterval);

  pollingInterval = setInterval(async () => {

    const updated = await fetchGameData();

    if (updated) {
      currentPAIndex = gameData.pitches.length - 1;
      renderAll();
      showUpdateFlash?.();
    }

    // 試合終了なら停止
    if (gameData?.meta?.status === "final") {
      clearInterval(pollingInterval);
    }

  }, 30000);
}



/* ===========================
   エラー表示
=========================== */
function showError(msg) {
  document.querySelectorAll("section, #zone, #field")
    .forEach(el => {
      el.innerHTML = `
        <div style="color:#ff4444;background:#200;padding:15px;border-radius:10px">
          データ読み込み失敗: ${msg}
        </div>`;
    });
}

/* ===========================
   総描画
=========================== */
function renderAll(){
  renderSummary();
  renderScoreboard();
  renderLineups();
  renderPitchLog();
  renderCount();
  renderZone();
  renderField();
  renderPitcherStats();
  renderBatterStats();
}

/* ===========================
   試合概要
=========================== */
function renderSummary(){
  const m = gameData?.meta;
  const sb = gameData?.scoreboard;
  if(!m) return;

  const awayR = sb?.total?.away?.R ?? 0;
  const homeR = sb?.total?.home?.R ?? 0;

  summary.innerHTML = `
    <div class="hero-summary">
      <div>
        <div class="hero-teams">${m.away} vs ${m.home}</div>
        <div class="hero-meta">
          ${m.date || "-"} ｜ ${m.stadium || "-"}
        </div>
      </div>
      <div class="hero-score">${awayR} - ${homeR}</div>
    </div>
  `;
}

/* ===========================
   スコアボード
=========================== */
function renderScoreboard(){

  const container = document.getElementById("scoreboard");
  if(!gameData?.scoreboard?.innings){
    container.innerHTML = "<p>スコアデータなし</p>";
    return;
  }

  const inningsData = gameData.scoreboard.innings;
  const totals = gameData.scoreboard.total;

  const maxInning = inningsData.length;

  const currentPA = gameData.pitches[currentPAIndex];
  const currentInning = currentPA?.inning;

  let html = `<table class="scoreboard-table"><thead><tr><th></th>`;

  for(let i=1;i<=maxInning;i++){
    const highlight = i === currentInning ? "current-inning" : "";
    html += `<th class="${highlight}">${i}</th>`;
  }

  html += `<th>R</th><th>H</th><th>E</th></tr></thead><tbody>`;

  /* ===== Away ===== */
  html += `<tr><td>${gameData.meta.away}</td>`;

  inningsData.forEach(inning=>{
    html += `<td>${inning.away ?? ""}</td>`;
  });

  html += `<td>${totals?.away?.R ?? ""}</td>`;
  html += `<td>${totals?.away?.H ?? ""}</td>`;
  html += `<td>${totals?.away?.E ?? ""}</td>`;
  html += `</tr>`;

  /* ===== Home ===== */
  html += `<tr><td>${gameData.meta.home}</td>`;

  inningsData.forEach(inning=>{
    html += `<td>${inning.home ?? ""}</td>`;
  });

  html += `<td>${totals?.home?.R ?? ""}</td>`;
  html += `<td>${totals?.home?.H ?? ""}</td>`;
  html += `<td>${totals?.home?.E ?? ""}</td>`;
  html += `</tr>`;

  html += `</tbody></table>`;

  container.innerHTML = html;
}
  
/* ===========================
   ラインナップ
=========================== */
function renderLineups(){
  renderTeam(gameData?.lineups?.home, homeLineup);
  renderTeam(gameData?.lineups?.away, awayLineup);
}

function renderTeam(players, container){
  if(!players || !container) return;
  container.innerHTML = "";

  players.forEach((p,i)=>{
    container.innerHTML += `
      <div class="lineup-item">
        <div>${i+1}</div>
        <div>${p.pos || "-"}</div>
        <div>
          <a href="/lionscrown/player.html?id=${p.id || p.name}"
             style="color:#7ecbff;text-decoration:none;">
            ${p.name || "-"}
          </a>
        </div>
        <div>${p.avg || "-"}</div>
      </div>`;
  });
}

/* ===========================
   投球ログ
=========================== */
function renderPitchLog(){
  const pa = gameData.pitches[currentPAIndex];
  if(!pa) return;

  let html =
    `<strong>${pa.inning}回 ${pa.half==="top"?"表":"裏"}
     打者: ${getPlayerNameById(pa.batter_id)}</strong><br>`;

  pa.pitches?.forEach((p,i)=>{
    html += `${i+1}球目:
      ${p.pitch_type || "-"}
      (${p.velocity || "-"}km/h)
      → ${p.result}<br>`;
  });

  pitchLog.innerHTML = html;
}

/* ===========================
   実戦仕様カウント計算
=========================== */
function renderCount(){
  const pa = gameData.pitches[currentPAIndex];
  if(!pa) return;

  let balls=0, strikes=0;

  pa.pitches?.forEach(p=>{
    if(p.result==="ball" && balls<3) balls++;
    if(p.result==="strike" && strikes<2) strikes++;
    if(p.result==="foul" && strikes<2) strikes++;
  });

  let html=`<div class="count-board">`;

  html+="B ";
  for(let i=0;i<3;i++){
    html+=`<span class="count-dot ${i<balls?'count-on ball':''}"></span>`;
  }

  html+=" S ";
  for(let i=0;i<2;i++){
    html+=`<span class="count-dot ${i<strikes?'count-on strike':''}"></span>`;
  }

  html+=" O ";
  for(let i=0;i<2;i++){
    html+=`<span class="count-dot ${i<(pa.final_count?.outs || 0)?'count-on out':''}"></span>`;
  }

  html+="</div>";

  countDisplay.innerHTML = html;
}
  
/* ===========================
   ストライクゾーン（正規化）
=========================== */
function renderZone(){

  const zoneEl = zone;
  const pa = gameData.pitches[currentPAIndex];
  if(!pa) return;

  zoneEl.innerHTML = "";

  // 5x5グリッド生成
  for(let row=0; row<5; row++){
    for(let col=0; col<5; col++){
      const cell = document.createElement("div");
      cell.className = "zone-cell";

      // 中央3×3をストライクゾーンに
      if(row>=1 && row<=3 && col>=1 && col<=3){
        cell.classList.add("strike-zone");
      }

      zoneEl.appendChild(cell);
    }
  }

  // 投球プロット
  pa.pitches?.forEach(p=>{
    if(!p.zone) return;

    const dot = document.createElement("div");
    dot.className = "pitchMarker result-"+(p.result||"ball");

    dot.style.left = (p.zone.x/4*100)+"%";
    dot.style.top  = (p.zone.y/4*100)+"%";

    dot.title = `${p.pitch_type} ${p.velocity}km/h`;

    zoneEl.appendChild(dot);
  });
}

/* ===========================
   守備位置（差分更新）
=========================== */
function renderField(){
  const pa = gameData.pitches[currentPAIndex];
  if(!pa?.fielders) return;

  if(JSON.stringify(pa.fielders) === JSON.stringify(currentFielders))
    return;

  currentFielders = pa.fielders;
  field.innerHTML = "";

  const posMap = {
    P:[50,55], C:[50,85],
    "1B":[75,65], "2B":[65,45],
    "3B":[25,65], SS:[35,45],
    LF:[25,20], CF:[50,10], RF:[75,20]
  };

  Object.entries(pa.fielders).forEach(([pos,name])=>{
    if(!posMap[pos]) return;

    const div=document.createElement("div");
    div.style.position="absolute";
    div.style.left=posMap[pos][0]+"%";
    div.style.top=posMap[pos][1]+"%";
    div.style.transform="translate(-50%,-50%)";
    div.style.background="white";
    div.style.color="black";
    div.style.padding="4px 8px";
    div.style.borderRadius="12px";
    div.textContent=`${pos} ${name}`;
    field.appendChild(div);
  });
}

/* ===========================
   投手詳細
=========================== */
function renderPitcherStats(){
  const pa = gameData.pitches[currentPAIndex];
  if(!pa) return;

  pitcherStats.innerHTML =
    `投手: ${getPlayerNameById(pa.pitcher_id)}<br>
     投球数: ${pa.pitches?.length || 0}`;
}

function showUpdateFlash(){
  const el = document.createElement("div");
  el.textContent = "UPDATE";
  el.style.position="fixed";
  el.style.top="20px";
  el.style.right="20px";
  el.style.padding="8px 16px";
  el.style.background="#4da3ff";
  el.style.color="black";
  el.style.fontWeight="bold";
  el.style.borderRadius="20px";
  el.style.zIndex="9999";
  document.body.appendChild(el);

  setTimeout(()=>el.remove(),1000);
}
  
/* ===========================
   打者最終結果集計
=========================== */
function renderBatterStats(){
  const results={};

  gameData.pitches.forEach(pa=>{
    if(!pa.result) return;
    results[pa.result] = (results[pa.result] || 0) + 1;
  });

  let html="";
  Object.entries(results)
    .forEach(([r,v])=>{
      html+=`${r}: ${v}<br>`;
    });

  batterStats.innerHTML = html || "データなし";
}

/* ===========================
   ナビゲーション
=========================== */
function getPlayerNameById(id){
  if(!id) return "-";

  const allPlayers = [
    ...(gameData.lineups?.home || []),
    ...(gameData.lineups?.away || [])
  ];

  const found = allPlayers.find(p=>p.id===id);
  return found?.name || id;
}
  
function prevPA(){
  if(currentPAIndex>0){
    currentPAIndex--;
    renderAll();
  }
}
function nextPA(){
  if(currentPAIndex<gameData.pitches.length-1){
    currentPAIndex++;
    renderAll();
  }
}
  
function latestPA(){
  currentPAIndex = gameData.pitches.length - 1;
  renderAll();
}
  
function searchBatter(){
  const name = document.getElementById("searchBatter").value.trim();

  const idx = gameData.pitches.findIndex(pa =>
    getPlayerNameById(pa.batter_id) === name
  );

  if(idx >= 0){
    currentPAIndex = idx;
    renderAll();
  }
}

init();
