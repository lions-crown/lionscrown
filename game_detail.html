<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一球速報 | L-crown</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:"Segoe UI","Noto Sans JP",sans-serif;
  background: radial-gradient(circle at top, #163b80 0%, #091b3d 40%, #050c1f 100%);
  color:white;
  min-height:100vh;
}

/* ===== 全幅使用 ===== */
main{
  width:100%;
  padding:30px;
}

/* ===== セクション共通 ===== */
section{
  margin-bottom:30px;
  padding:24px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(14px);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

h1{margin-bottom:20px;font-size:26px;}
h2{margin-bottom:14px;font-size:18px;}

/* ===== スコアボード横拡張 ===== */
#scoreboard table{
  width:100%;
  font-size:14px;
  border-collapse:collapse;
}

#scoreboard th,
#scoreboard td{
  padding:8px;
}

/* ===== 3カラム構成 ===== */
.dashboard{
  display:grid;
  grid-template-columns: 1fr 2fr 1fr;
  gap:30px;
  align-items:start;
}

/* ラインナップ */
.lineup-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.lineup-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  transition: 0.2s;
}

.lineup-item:hover {
  background: rgba(255,255,255,0.15);
  transform: translateX(4px);
}

.batting-order {
  font-weight: bold;
  color: #7ecbff;
  width: 20px;
}

.position {
  font-weight: bold;
  color: #ffd84d;
  margin-right: 6px;
}

.player-name {
  flex: 1;
}

.avg {
  font-size: 12px;
  opacity: 0.8;
}
  
.lineup-box{
  padding:20px;
  border-radius:18px;
  background:rgba(255,255,255,0.04);
}

/* ===== 投球ログ中央 ===== */
.center-panel{
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* ===== ZONE ===== */
:root { --zone-size: 340px; }

#zone{
  position:relative;
  width:var(--zone-size);
  height:var(--zone-size);
  border:2px solid white;
}

.zoneGrid{
  position:absolute;
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(5,1fr);
}

.zoneGrid div{border:1px solid #333;}
.zoneGrid div.strikeZone{border:1px solid #aaa;}

.pitchMarker{
  position:absolute;
  width:18px;
  height:18px;
  font-size:9px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  transform:translate(-50%,-50%);
  border:1px solid black;
}

.result-strike{background:yellow;color:black;}
.result-ball{background:green;color:white;}
.result-hit{background:red;color:white;}
.result-out{background:gray;color:white;}

/* ===== ボタン ===== */
button{
  padding:8px 18px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:linear-gradient(90deg,#4da3ff,#7ecbff);
  color:black;
  font-weight:bold;
  transition:0.25s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

/* ===== レスポンシブ ===== */
@media(max-width:1000px){
  .dashboard{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<main>

<h1>一球速報</h1>

<section>
  <h2>試合概要</h2>
  <div id="summary"></div>
</section>

<!-- スコアボード横いっぱい -->
<section>
  <h2>スコアボード</h2>
  <div id="scoreboard"></div>
</section>

<!-- 3カラムエリア -->
<div class="dashboard">

  <!-- チーム① -->
  <section class="lineup-box">
    <h2>ホーム</h2>
    <div id="homeLineup"></div>
  </section>

  <!-- 中央：投球ログ -->
  <section class="center-panel">
    <h2>投球ログ</h2>

    <div id="pitchLog"></div>
    <div id="countDisplay"></div>

    <div>
      <button type="button" onclick="prevPA()">前打者</button>
      <button type="button" onclick="nextPA()">次打者</button>
    </div>

    <div id="zone"></div>
    <div id="field" style="position:relative;height:240px;"></div>
  </section>

  <!-- チーム② -->
  <section class="lineup-box">
    <h2>ビジター</h2>
    <div id="awayLineup"></div>
  </section>

</div>

<!-- 下部情報 -->
<section>
  <h2>投手詳細</h2>
  <div id="pitcherStats"></div>
  <canvas id="pitchChart" width="100" height="100"></canvas>
</section>

<section>
  <h2>打者詳細</h2>
  <div id="batterStats"></div>
</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/game.js"></script>
</body>
</html>
