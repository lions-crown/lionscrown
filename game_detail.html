<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一球速報 | L-crown</title>

<link rel="icon" type="image/webp" href="https://lions-crown.homep.jp/img/1766145327164.webp">
<link rel="apple-touch-icon" href="https://lions-crown.homep.jp/img/1766145327164.webp">
<meta name="theme-color" content="#0f172a">

<style>
/* ============================= */
/* 共通リセット・背景・フォント */
/* ============================= */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Segoe UI","Noto Sans JP",sans-serif;
  background: radial-gradient(circle at top, #163b80 0%, #091b3d 40%, #050c1f 100%);
  color:white;
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.75;
}
body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background: radial-gradient(circle, rgba(77,163,255,0.25), transparent 70%);
  top:-120px;
  right:-120px;
  filter:blur(40px);
  z-index:-1;
}

/* ============================= */
/* ヘッダー・メニュー */
/* ============================= */
header{
  position:sticky;
  top:0;
  backdrop-filter:blur(14px);
  background:rgba(10,25,60,0.55);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:1000;
}
nav{
  max-width:1200px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 24px;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  font-size:18px;
  letter-spacing:1px;
  text-decoration:none;
  color:white;
}
.logo span{
  background:linear-gradient(90deg,#4da3ff,#9ad0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.logo img{
  width:26px;
  height:26px;
  border-radius:6px;
  filter:drop-shadow(0 0 6px rgba(77,163,255,0.6));
}
.menu{
  display:flex;
  gap:24px;
}
.menu a{
  color:rgba(255,255,255,0.7);
  text-decoration:none;
  font-size:13px;
  position:relative;
  transition:0.25s;
}
.menu a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-6px;
  width:0;
  height:2px;
  background:linear-gradient(90deg,#4da3ff,#7ecbff);
  transition:0.25s;
}
.menu a:hover{
  color:white;
}
.menu a:hover::after{
  width:100%;
}

/* ============================= */
/* 本文・カード */
main{
  max-width:1200px;
  margin:50px auto;
  padding:0 20px;
}
section{
  margin-bottom:30px;
  padding:24px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(14px);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}
h1{margin-bottom:20px;font-size:26px;}
h2{margin-bottom:14px;font-size:18px;}
#scoreboard{
  margin-bottom:20px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.score-inning{
  padding:6px 12px;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  text-align:center;
  min-width:50px;
}
.dashboard{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  gap:30px;
  align-items:start;
}
.lineup-box{
  padding:20px;
  border-radius:18px;
  background:rgba(255,255,255,0.04);
}
.lineup-list{display:flex;flex-direction:column;gap:8px;}
.lineup-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 12px;
  border-radius:10px;
  background: rgba(255,255,255,0.06);
  transition:0.2s;
}
.lineup-item:hover{
  background: rgba(255,255,255,0.15);
  transform: translateX(4px);
}
.center-panel{display:flex;flex-direction:column;gap:20px;}
#zone{
  position:relative;
  width:340px;
  height:340px;
  border:2px solid white;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(5,1fr);
}
#zone div{border:1px solid #333; position:relative;}
#zone div.strikeZone{border:1px solid #aaa;}
.pitchMarker{
  position:absolute;width:18px;height:18px;font-size:9px;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);border:1px solid black;
}
.result-strike{background:yellow;color:black;}
.result-ball{background:green;color:white;}
.result-hit{background:red;color:white;}
.result-out{background:gray;color:white;}
button{
  padding:8px 18px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:linear-gradient(90deg,#4da3ff,#7ecbff);
  color:black;
  font-weight:bold;
  transition:0.25s;
}
button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,0.5);
}
@media(max-width:1000px){
  .dashboard{grid-template-columns:1fr;}
}

/* ============================= */
/* フッター */
footer{
  margin-top:100px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,0.08);
  text-align:center;
  padding:20px 0;
}
footer a{text-decoration:none;color:#7ecbff;}
footer a:hover{color:white;}
</style>
</head>
<body>

<header>
  <nav>
    <a href="/" class="logo"><img src="https://lions-crown.homep.jp/img/1766145327164.webp" alt="L-crown icon"><span>L-crown</span></a>
    <div class="menu">
      <a href="/">ホーム</a>
      <a href="/news">お知らせ</a>
      <a href="/privacypolicy">利用規約</a>
      <a href="/contact">お問い合わせ</a>
    </div>
  </nav>
</header>

<main>
<h1>一球速報</h1>

<section>
  <h2>試合概要</h2>
  <div id="summary"></div>
</section>

<section>
  <h2>スコアボード</h2>
  <div id="scoreboard"></div>
</section>

<div class="dashboard">
  <section class="lineup-box">
    <h2>ホーム</h2>
    <div id="homeLineup"></div>
  </section>

  <section class="center-panel">
    <h2>投球ログ</h2>
    <input type="text" id="searchBatter" placeholder="選手名で検索">
    <button onclick="searchBatter()">検索</button>
    <button onclick="latestPA()">最新に戻る</button>
    <div id="pitchLog"></div>
    <div id="countDisplay"></div>
    <div>
      <button onclick="prevPA()">前打者</button>
      <button onclick="nextPA()">次打者</button>
    </div>
    <div id="zone"></div>
    <div id="field" style="position:relative;height:240px;"></div>
  </section>

  <section class="lineup-box">
    <h2>ビジター</h2>
    <div id="awayLineup"></div>
  </section>
</div>

<section>
  <h2>投手詳細</h2>
  <div id="pitcherStats"></div>
</section>

<section>
  <h2>打者詳細</h2>
  <div id="batterStats"></div>
</section>
</main>

<footer>
  <div>© <span id="year"></span> L-crown. All rights reserved.</div>
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

// ---------------------
// JS / game.js 内容
// ---------------------
let gameData = null;
let currentPAIndex = 0;

async function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const date = urlParams.get("date") || "2026-03-01";
  const team = urlParams.get("team") || "1";

  const jsonUrl = `live/${date}_${team}.json`;

  try {
    const res = await fetch(jsonUrl);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    gameData = await res.json();
    currentPAIndex = gameData.pitches.length - 1;
    renderAllComponents();
  } catch(err) {
    console.error("データ取得エラー:", err);
    showError(err.message);
  }
}

function showError(msg){
  ["summary","scoreboard","homeLineup","awayLineup","field","zone","pitcherStats","batterStats"]
    .forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.innerHTML=`<div style="color:red; background:#fee; padding:12px; border:1px solid #faa; border-radius:6px;">データ読み込み失敗: ${msg}</div>`;
    });
}

function renderAllComponents(){
  renderSummary();
  renderScoreboard();
  renderLineups();
  renderField();
  renderZone();
  renderPitchLog();
  renderCount();
  renderPitcherStats();
  renderBatterStats();
}

// --- 試合概要 ---
function renderSummary(){
  if(!gameData?.meta) return;
  const m = gameData.meta;
  document.getElementById("summary").innerHTML = `${m.home} vs ${m.away}<br>球場: ${m.stadium}<br>開始: ${m.date}`;
}

// --- スコアボード ---
function renderScoreboard(){
  if(!gameData?.scoreboard) return;
  const sb = gameData.scoreboard;
  const container = document.getElementById("scoreboard");
  container.innerHTML = "";

  // 回ごとのスコア
  sb.innings.forEach(i=>{
    const div = document.createElement("div");
    div.className = "score-inning";
    div.innerHTML = `${i.inning}回<br>${sb.away?.[i.inning-1]?.away||i.away} - ${i.home}`;
    container.appendChild(div);
  });

  // 合計
  const totalDiv = document.createElement("div");
  totalDiv.className = "score-inning";
  totalDiv.innerHTML = `<strong>合計</strong><br>${sb.total.away.R} - ${sb.total.home.R}`;
  container.appendChild(totalDiv);
}

// --- ラインナップ ---
function renderLineups(){
  renderTeam(gameData.lineups?.home, document.getElementById("homeLineup"));
  renderTeam(gameData.lineups?.away, document.getElementById("awayLineup"));
}
function renderTeam(players, container){
  if(!container || !players) return;
  container.innerHTML="";
  const list = document.createElement("div");
  list.className="lineup-list";
  players.forEach((p,i)=>{
    const item = document.createElement("div");
    item.className="lineup-item";
    item.innerHTML=`<div class="batting-order">${i+1}</div><div class="position">${p.pos||"-"}</div><div class="player-name">${p.name||"???"}</div><div class="avg">${p.avg||"-"}</div>`;
    list.appendChild(item);
  });
  container.appendChild(list);
}

// --- 投球ログ ---
function renderPitchLog(){
  const pa = gameData.pitches?.[currentPAIndex];
  if(!pa) return;
  let html = `<strong>${pa.inning}回 ${pa.half==="top"?"表":"裏"} 打者: ${pa.batter_name||pa.batter||"-"}</strong><br>`;
  (pa.pitches||[]).forEach((p,i)=> html += `${i+1}球目: ${p.pitch_type} / ${p.result}<br>`);
  document.getElementById("pitchLog").innerHTML = html;
}

// --- カウント表示 ---
function renderCount(){
  const container = document.getElementById("countDisplay");
  const pa = gameData.pitches?.[currentPAIndex];
  if(!container||!pa) return;
  let balls=0,strikes=0;
  pa.pitches?.forEach(p=>{
    if(p.result==="ball") balls++;
    if(p.result==="strike"||p.result==="foul") strikes++;
  });
  container.textContent = `B:${balls} S:${strikes} O:${pa.final_count?.outs||0}`;
}

// --- フィールド ---
function renderField(){
  const fieldEl = document.getElementById("field");
  const pa = gameData.pitches?.[currentPAIndex];
  if(!fieldEl || !pa) return;
  fieldEl.innerHTML="";
  const posMap = {P:{top:"55%",left:"50%"},C:{top:"85%",left:"50%"}, "1B":{top:"65%",left:"75%"}, "2B":{top:"45%",left:"65%"}, "3B":{top:"65%",left:"25%"}, SS:{top:"45%",left:"35%"}, LF:{top:"20%",left:"25%"}, CF:{top:"10%",left:"50%"}, RF:{top:"20%",left:"75%"}};
  Object.entries(pa.fielders||{}).forEach(([pos,name])=>{
    if(!posMap[pos]) return;
    const div = document.createElement("div");
    div.style.position="absolute";
    div.style.top=posMap[pos].top;
    div.style.left=posMap[pos].left;
    div.style.transform="translate(-50%,-50%)";
    div.style.background="white";
    div.style.color="black";
    div.style.padding="4px 6px";
    div.style.borderRadius="10px";
    div.style.fontSize="12px";
    div.textContent=`${pos} ${name}`;
    fieldEl.appendChild(div);
  });
}

// --- ストライクゾーン ---
function renderZone(){
  const zone = document.getElementById("zone");
  const pa = gameData.pitches?.[currentPAIndex];
  if(!zone || !pa) return;
  zone.innerHTML="";
  pa.pitches?.forEach((p,i)=>{
    if(!p.zone) return;
    const dot = document.createElement("div");
    dot.className="pitchMarker result-"+p.result;
    dot.style.left=`${p.zone.x*20}%`;
    dot.style.top=`${p.zone.y*20}%`;
    dot.title=`${p.pitch_type} ${p.velocity}km/h`;
    zone.appendChild(dot);
  });
}

// --- 投手詳細 ---
function renderPitcherStats(){
  const pa = gameData.pitches?.[currentPAIndex];
  if(!pa) return;
  let html=`投手: ${pa.pitcher_id || "不明"}<br>投球数: ${pa.pitches.length}`;
  document.getElementById("pitcherStats").innerHTML = html;
}

// --- 打者詳細 ---
function renderBatterStats(){
  const byResult={};
  gameData.pitches?.forEach(pa=> byResult[pa.result]=(byResult[pa.result]||0)+1);
  let html="";
  for(let r in byResult) html+=`${r}: ${byResult[r]}<br>`;
  document.getElementById("batterStats").innerHTML = html||"データなし";
}

// --- 打者切替・検索 ---
function prevPA(){ if(currentPAIndex>0){currentPAIndex--; renderAllComponents(); } }
function nextPA(){ if(currentPAIndex<gameData.pitches.length-1){ currentPAIndex++; renderAllComponents(); } }
function latestPA(){ currentPAIndex=gameData.pitches.length-1; renderAllComponents(); }
function searchBatter(){
  const name = document.getElementById("searchBatter").value.trim();
  const idx = gameData.pitches.findIndex(pa=> pa.batter_name===name || pa.batter===name);
  if(idx>=0){ currentPAIndex=idx; renderAllComponents(); }
}
function goToInning(inning){
  const idx = gameData.pitches.findIndex(pa=> pa.inning===inning);
  if(idx>=0){ currentPAIndex=idx; renderAllComponents(); }
}

init();
</script>

</body>
</html>
