<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試合詳細</title>

<style>
body{font-family:sans-serif;background:#f2f4f7;margin:0}
section{background:white;margin:10px;padding:15px;border-radius:8px}
#main-area{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
#zone-grid{display:grid;grid-template-columns:repeat(5,50px);grid-template-rows:repeat(5,50px);gap:3px;justify-content:center}
.zone-cell{border:1px solid #ccc;position:relative}
.strike-zone{background:#fff6cc}
.pitch-dot{width:12px;height:12px;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.player{display:flex;justify-content:space-between}
.inning-link{cursor:pointer;color:blue}
</style>
</head>

<body>

<section id="game-info"></section>
<section id="scoreboard"></section>
<section id="matchup"></section>

<section id="main-area">
  <div>
    <h3 id="team1-name"></h3>
    <div id="team1-starters"></div>
    <h4>ベンチ</h4>
    <div id="team1-bench"></div>
  </div>

  <div>
    <div id="zone-grid"></div>
    <button onclick="prevAtBat()">前打者</button>
    <button onclick="nextAtBat()">次打者</button>
    <div id="pitch-summary"></div>
  </div>

  <div>
    <h3 id="team2-name"></h3>
    <div id="team2-starters"></div>
    <h4>ベンチ</h4>
    <div id="team2-bench"></div>
  </div>
</section>

<section id="data-area">
  <div id="pitcher-data"></div>
  <div id="batter-data"></div>
</section>

<script src="js/game.js"></script>
</body>
</html>
