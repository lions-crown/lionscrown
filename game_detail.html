<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一球速報 | L-crown</title>

<link rel="icon" type="image/webp" href="https://lions-crown.homep.jp/img/1766145327164.webp">
<link rel="apple-touch-icon" href="https://lions-crown.homep.jp/img/1766145327164.webp">
<meta name="theme-color" content="#0f172a">

<style>
/* ============================= */
/* 共通リセット・背景・フォント */
/* ============================= */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Segoe UI","Noto Sans JP",sans-serif;
  background: radial-gradient(circle at top, #163b80 0%, #091b3d 40%, #050c1f 100%);
  color:white;
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.75;
}
body::before{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  background: radial-gradient(circle, rgba(77,163,255,0.25), transparent 70%);
  top:-120px;
  right:-120px;
  filter:blur(40px);
  z-index:-1;
}

/* ============================= */
/* ヘッダー・メニュー */
/* ============================= */
header{
  position:sticky;
  top:0;
  backdrop-filter:blur(14px);
  background:rgba(10,25,60,0.55);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:1000;
}
nav{
  max-width:1200px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 24px;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  font-size:18px;
  letter-spacing:1px;
  text-decoration:none;
  color:white;
}
.logo span{
  background:linear-gradient(90deg,#4da3ff,#9ad0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.logo img{
  width:26px;
  height:26px;
  border-radius:6px;
  filter:drop-shadow(0 0 6px rgba(77,163,255,0.6));
}
.menu{
  display:flex;
  gap:24px;
}
.menu a{
  color:rgba(255,255,255,0.7);
  text-decoration:none;
  font-size:13px;
  position:relative;
  transition:0.25s;
}
.menu a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-6px;
  width:0;
  height:2px;
  background:linear-gradient(90deg,#4da3ff,#7ecbff);
  transition:0.25s;
}
.menu a:hover{
  color:white;
}
.menu a:hover::after{
  width:100%;
}

/* ============================= */
/* 本文・カード */
/* ============================= */
main{
  max-width:1200px;
  margin:50px auto;
  padding:0 20px;
}
section{
  margin-bottom:30px;
  padding:24px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(14px);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}
h1{margin-bottom:20px;font-size:26px;}
h2{margin-bottom:14px;font-size:18px;}
#scoreboard{
  margin-bottom:20px;
}
#scoreboard a{
  margin-right:10px;
  text-decoration:none;
  color:#7ecbff;
  font-weight:bold;
  cursor:pointer;
}
#scoreboard a:hover{color:white;}
.dashboard{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  gap:30px;
  align-items:start;
}
.lineup-box{
  padding:20px;
  border-radius:18px;
  background:rgba(255,255,255,0.04);
}
.lineup-list{display:flex;flex-direction:column;gap:8px;}
.lineup-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 12px;
  border-radius:10px;
  background: rgba(255,255,255,0.06);
  transition:0.2s;
}
.lineup-item:hover{
  background: rgba(255,255,255,0.15);
  transform: translateX(4px);
}
.center-panel{display:flex;flex-direction:column;gap:20px;}
#zone{
  position:relative;
  width:340px;
  height:340px;
  border:2px solid white;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(5,1fr);
}
#zone div{border:1px solid #333; position:relative;}
#zone div.strikeZone{border:1px solid #aaa;}
.pitchMarker{
  position:absolute;width:18px;height:18px;font-size:9px;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);border:1px solid black;
}
.result-strike{background:yellow;color:black;}
.result-ball{background:green;color:white;}
.result-hit{background:red;color:white;}
.result-out{background:gray;color:white;}
button{
  padding:8px 18px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:linear-gradient(90deg,#4da3ff,#7ecbff);
  color:black;
  font-weight:bold;
  transition:0.25s;
}
button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,0.5);
}
@media(max-width:1000px){
  .dashboard{grid-template-columns:1fr;}
}

/* ============================= */
/* フッター */
/* ============================= */
footer{
  margin-top:100px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,0.08);
  text-align:center;
  padding:20px 0;
}
footer a{text-decoration:none;color:#7ecbff;}
footer a:hover{color:white;}
</style>
</head>
<body>

<header>
  <nav>
    <a href="/" class="logo"><img src="https://lions-crown.homep.jp/img/1766145327164.webp" alt="L-crown icon"><span>L-crown</span></a>
    <div class="menu">
      <a href="/">ホーム</a>
      <a href="/news">お知らせ</a>
      <a href="/privacypolicy">利用規約</a>
      <a href="/contact">お問い合わせ</a>
    </div>
  </nav>
</header>

<main>
<h1>一球速報</h1>

<section>
  <h2>試合概要</h2>
  <div id="summary"></div>
</section>

<section>
  <h2>スコアボード</h2>
  <div id="scoreboard"></div>
</section>

<div class="dashboard">
  <section class="lineup-box">
    <h2>ホーム</h2>
    <div id="homeLineup"></div>
  </section>

  <section class="center-panel">
    <h2>投球ログ</h2>
    <input type="text" id="searchBatter" placeholder="選手名で検索">
    <button onclick="searchBatter()">検索</button>
    <button onclick="latestPA()">最新に戻る</button>
    <div id="pitchLog"></div>
    <div id="countDisplay"></div>
    <div>
      <button onclick="prevPA()">前打者</button>
      <button onclick="nextPA()">次打者</button>
    </div>
    <div id="zone"></div>
    <div id="field" style="position:relative;height:240px;"></div>
  </section>

  <section class="lineup-box">
    <h2>ビジター</h2>
    <div id="awayLineup"></div>
  </section>
</div>

<section>
  <h2>投手詳細</h2>
  <div id="pitcherStats"></div>
</section>

<section>
  <h2>打者詳細</h2>
  <div id="batterStats"></div>
</section>
</main>

<footer>
  <div>© <span id="year"></span> L-crown. All rights reserved.</div>
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

/* ============================= */
/* デモデータ（過去ログ含むサンプル） */
/* ============================= */
const gameData = {
  meta:{
    game_id:"2026-03-01_1",
    date:"2026-03-01",
    home:"L",
    away:"M",
    stadium:"ベルーナドーム",
    umpires:["球審 山田","一塁 佐藤","二塁 鈴木","三塁 田中"]
  },
  lineup:{
    home:[
      {id:"L2026_51",name:"西川 愛也",pos:"CF",avg:".280"},
      {id:"L2026_7",name:"桑原 将志",pos:"RF",avg:".305"},
      {id:"L2026_13",name:"髙橋 光成",pos:"P",avg:"2.00"}
    ],
    away:[
      {id:"J2026_1",name:"大谷 翔平",pos:"DH",avg:".290"},
      {id:"J2026_2",name:"近藤 健介",pos:"RF",avg:".290"}
    ]
  },
  scoreboard:{
    innings:[
      {inning:1,home:0,away:1},
      {inning:2,home:0,away:0},
      {inning:3,home:2,away:1}
    ]
  },
  pitches:[
    {
      pa_id:1,inning:1,half:"top",batter:"大谷 翔平",pitcher:"髙橋 光成",result:"out",
      final_count:{balls:0,strikes:2,outs:1},
      pitches:[
        {pitch_type:"slider",velocity:138,zone:{x:2.5,y:2.5},result:"strike"},
        {pitch_type:"fastball",velocity:145,zone:{x:1,y:4},result:"strike"}
      ]
    },
    {
      pa_id:2,inning:1,half:"bottom",batter:"髙橋 光成",pitcher:"大谷 翔平",result:"hit",
      final_count:{balls:1,strikes:1,outs:1},
      pitches:[
        {pitch_type:"fastball",velocity:144,zone:{x:3,y:2},result:"ball"}
      ]
    },
    {
      pa_id:3,inning:2,half:"top",batter:"近藤 健介",pitcher:"髙橋 光成",result:"hit",
      final_count:{balls:2,strikes:1,outs:2},
      pitches:[
        {pitch_type:"curve",velocity:130,zone:{x:4,y:3},result:"strike"}
      ]
    }
  ]
};

/* ============================= */
/* 状態管理 */
/* ============================= */
let currentPAIndex = gameData.pitches.length-1; // 最新打者

function renderSummary(){
  const s = gameData.meta;
  document.getElementById("summary").textContent = `試合: ${s.home} vs ${s.away} @ ${s.stadium}`;
}

function renderLineups(){
  document.getElementById("homeLineup").textContent = gameData.lineup.home.map(p=>p.name).join(", ");
  document.getElementById("awayLineup").textContent = gameData.lineup.away.map(p=>p.name).join(", ");
}

function renderScoreboard(){
  const sb=document.getElementById("scoreboard");
  sb.innerHTML="";
  gameData.scoreboard.innings.forEach((i,index)=>{
    const link=document.createElement("a");
    link.href="#";
    link.textContent = i.half===undefined ? i.inning+"回" : i.inning+"回";
    link.onclick=e=>{
      e.preventDefault();
      goToInning(i.inning);
    };
    sb.appendChild(link);
  });
}

/* ============================= */
/* 投球ログ・ゾーン描画 */
/* ============================= */
function renderPA(){
  const pa = gameData.pitches[currentPAIndex];
  if(!pa) return;
  document.getElementById("pitchLog").textContent = `打者: ${pa.batter} 結果: ${pa.result}`;
  document.getElementById("countDisplay").textContent = `B:${pa.final_count.balls} S:${pa.final_count.strikes} O:${pa.final_count.outs}`;

  // ゾーン描画
  const zoneEl = document.getElementById("zone");
  zoneEl.innerHTML="";
  pa.pitches.forEach(p=>{
    const dot=document.createElement("div");
    dot.className="pitchMarker result-"+p.result.replace(/\s+/g,'-');
    dot.style.left=`${p.zone.x*20}%`;
    dot.style.top=`${p.zone.y*20}%`;
    dot.title=`${p.pitch_type} ${p.velocity}km/h`;
    zoneEl.appendChild(dot);
  });
}

/* ============================= */
/* 打者移動・検索 */
/* ============================= */
function prevPA(){if(currentPAIndex>0){currentPAIndex--; renderPA();}}
function nextPA(){if(currentPAIndex<gameData.pitches.length-1){currentPAIndex++; renderPA();}}
function latestPA(){currentPAIndex=gameData.pitches.length-1; renderPA();}
function searchBatter(){
  const name = document.getElementById("searchBatter").value.trim();
  const idx = gameData.pitches.findIndex(p=>p.batter===name);
  if(idx>=0){currentPAIndex=idx; renderPA();}
}

/* ============================= */
/* イニングリンク */
/* ============================= */
function goToInning(inning){
  const idx = gameData.pitches.findIndex(p=>p.inning===inning);
  if(idx>=0){currentPAIndex=idx; renderPA();}
}

/* ============================= */
/* 初期表示 */
/* ============================= */
function init(){
  renderSummary();
  renderLineups();
  renderScoreboard();
  renderPA();
}
init();
</script>

</body>
</html>
