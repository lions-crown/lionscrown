<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一球速報 | L-crown</title>

<link rel="icon" type="image/webp" href="https://lions-crown.homep.jp/img/1766145327164.webp">
<link rel="apple-touch-icon" href="https://lions-crown.homep.jp/img/1766145327164.webp">
<meta name="theme-color" content="#0f172a">

<style>
/* 共通スタイルは省略、上の完全版CSSをそのまま使用できます */
body{font-family:"Segoe UI","Noto Sans JP",sans-serif;color:white;background:#091b3d;}
header, main, footer{max-width:1200px;margin:auto;}
button{cursor:pointer;}
.pitchMarker{position:absolute;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);border:1px solid black;font-size:9px;}
.result-strike{background:yellow;color:black;}
.result-ball{background:green;color:white;}
.result-hit{background:red;color:white;}
.result-out{background:gray;color:white;}
.zoneGrid{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);border:2px solid white;width:340px;height:340px;margin:auto;position:relative;}
.zoneGrid div{border:1px solid #333;}
.zoneGrid div.strikeZone{border:1px solid #aaa;}
</style>
</head>
<body>

<header>
<nav>
<a href="/" class="logo"><img src="https://lions-crown.homep.jp/img/1766145327164.webp" alt="L-crown icon"><span>L-crown</span></a>
<div class="menu"><a href="/">ホーム</a><a href="/news">お知らせ</a><a href="/privacypolicy">利用規約</a><a href="/contact">お問い合わせ</a></div>
</nav>
</header>

<main>
<h1>一球速報</h1>

<section>
  <h2>試合概要</h2>
  <div id="summary"></div>
</section>

<section>
  <h2>スコアボード</h2>
  <div id="scoreboard"></div>
</section>

<div class="dashboard">
  <section class="lineup-box">
    <h2>ホーム</h2>
    <div id="homeLineup"></div>
  </section>

  <section class="center-panel">
    <h2>投球ログ</h2>
    <input type="text" id="searchBatter" placeholder="選手名で検索">
    <button onclick="searchBatter()">検索</button>
    <button onclick="latestPA()">最新に戻る</button>
    <div id="pitchLog"></div>
    <div id="countDisplay"></div>
    <div>
      <button onclick="prevPA()">前打者</button>
      <button onclick="nextPA()">次打者</button>
    </div>
    <div id="zone" class="zoneGrid"></div>
    <div id="field" style="position:relative;height:240px;"></div>
  </section>

  <section class="lineup-box">
    <h2>ビジター</h2>
    <div id="awayLineup"></div>
  </section>
</div>

<section>
  <h2>投手詳細</h2>
  <div id="pitcherStats"></div>
</section>

<section>
  <h2>打者詳細</h2>
  <div id="batterStats"></div>
</section>
</main>

<footer>
<div>© <span id="year"></span> L-crown. All rights reserved.</div>
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

/* ====== デモデータ ====== */
const gameData = {
  meta:{game_id:"2026-03-01_1",date:"2026-03-01",home:"L",away:"M"},
  lineup:{
    home:[{id:"L2026_13",name:"髙橋 光成",pos:"P",avg:"2.00"}],
    away:[{id:"J2026_1",name:"大谷 翔平",pos:"DH",avg:".290"}]
  },
  scoreboard:{
    innings:[
      {inning:1,home:0,away:1},
      {inning:2,home:0,away:0}
    ],
  },
  pitches:[
    {pa_id:1,inning:1,half:"top",batter:"大谷 翔平",pitcher:"髙橋 光成",result:"out",final_count:{balls:0,strikes:2,outs:1},
      pitches:[
        {pitch_type:"slider",velocity:138,zone:{x:2.5,y:2.5},result:"strike"},
        {pitch_type:"fastball",velocity:145,zone:{x:1,y:4},result:"strike"}
      ]
    },
    {pa_id:2,inning:1,half:"bottom",batter:"髙橋 光成",pitcher:"大谷 翔平",result:"hit",final_count:{balls:1,strikes:1,outs:1},
      pitches:[
        {pitch_type:"fastball",velocity:144,zone:{x:3,y:2},result:"ball"}
      ]
    }
  ]
};

/* ====== 状態管理 ====== */
let currentPAIndex = gameData.pitches.length -1; // 最新打者

function renderSummary(){document.getElementById("summary").textContent=`試合: ${gameData.meta.home} vs ${gameData.meta.away}`;}
function renderLineups(){
  document.getElementById("homeLineup").textContent = gameData.lineup.home.map(p=>p.name).join(", ");
  document.getElementById("awayLineup").textContent = gameData.lineup.away.map(p=>p.name).join(", ");
}
function renderScoreboard(){
  const sb=document.getElementById("scoreboard");
  sb.innerHTML="";
  gameData.scoreboard.innings.forEach((i,index)=>{
    const link = document.createElement("a");
    link.href="#"; link.textContent=`${i.inning}回`; link.style.marginRight="8px";
    link.onclick=e=>{e.preventDefault(); goToInning(index);};
    sb.appendChild(link);
  });
}

/* ====== 投球・カウント描画 ====== */
function renderPA(){
  const pa = gameData.pitches[currentPAIndex];
  if(!pa) return;
  document.getElementById("pitchLog").textContent = `打者: ${pa.batter}, 結果: ${pa.result}`;
  document.getElementById("countDisplay").textContent = `B:${pa.final_count.balls} S:${pa.final_count.strikes} O:${pa.final_count.outs}`;

  // ゾーン描画
  const zoneEl = document.getElementById("zone");
  zoneEl.innerHTML="";
  pa.pitches.forEach(p=>{
    const dot = document.createElement("div");
    dot.className="pitchMarker result-"+p.result;
    dot.style.left=`${p.zone.x*20}%`; dot.style.top=`${p.zone.y*20}%`;
    dot.title=`${p.pitch_type} ${p.velocity}km/h`;
    zoneEl.appendChild(dot);
  });
}

/* ====== 打者移動 ====== */
function prevPA(){if(currentPAIndex>0){currentPAIndex--; renderPA();}}
function nextPA(){if(currentPAIndex<gameData.pitches.length-1){currentPAIndex++; renderPA();}}
function latestPA(){currentPAIndex=gameData.pitches.length-1; renderPA();}

/* ====== イニングリンク処理 ====== */
function goToInning(index){
  const inning = gameData.scoreboard.innings[index].inning;
  const firstPAIndex = gameData.pitches.findIndex(p=>p.inning===inning);
  if(firstPAIndex>=0){currentPAIndex=firstPAIndex; renderPA();}
}

/* ====== 選手名検索 ====== */
function searchBatter(){
  const name=document.getElementById("searchBatter").value.trim();
  const foundIndex = gameData.pitches.findIndex(p=>p.batter===name);
  if(foundIndex>=0){currentPAIndex=foundIndex; renderPA();}
}

/* ====== 初期表示 ====== */
function init(){
  renderSummary();
  renderLineups();
  renderScoreboard();
  renderPA();
}
init();
</script>

</body>
</html>
