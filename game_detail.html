<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NPB Live View</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
  margin:0;
  background:#0b0f1a;
  color:white;
  font-family:'Segoe UI',sans-serif;
}

header{
  background:linear-gradient(90deg,#0f2027,#203a43,#2c5364);
  padding:15px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

.section{
  margin:15px;
  padding:15px;
  background:#111827;
  border-radius:12px;
}

/* スコアボード */
.score-table{
  width:100%;
  border-collapse:collapse;
  text-align:center;
  font-size:18px;
}
.score-table th,.score-table td{
  padding:6px;
  border:1px solid #333;
}
.score-table th{
  background:#1f2937;
}

/* 電光掲示板 */
.count-board{
  display:flex;
  justify-content:center;
  gap:20px;
  font-size:28px;
}
.light{
  width:20px;
  height:20px;
  border-radius:50%;
  margin:4px;
  background:#333;
}
.on.green{background:#0f0;}
.on.yellow{background:#ff0;}
.on.red{background:#f00;}

.count-group{text-align:center}

/* フィールド */
.field{
  position:relative;
  width:400px;
  height:400px;
  margin:auto;
  background:#14532d;
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
}
.base{
  position:absolute;
  width:50px;
  text-align:center;
  font-size:14px;
}
.first{ right:60px; top:160px;}
.second{ top:40px; left:175px;}
.third{ left:60px; top:160px;}

.pos{
  position:absolute;
  font-size:13px;
  text-align:center;
  width:80px;
}
.P{top:200px;left:160px;}
.C{top:300px;left:160px;}
.SS{top:150px;left:120px;}
.CF{top:80px;left:160px;}
.LF{top:120px;left:40px;}
.RF{top:120px;right:40px;}

/* ゾーン */
.zone{
  display:grid;
  grid-template-columns:repeat(5,40px);
  grid-template-rows:repeat(5,40px);
  gap:2px;
}
.cell{
  background:#1f2937;
  position:relative;
}
.strike{background:#374151;}
.dot{
  position:absolute;
  width:20px;
  height:20px;
  border-radius:50%;
  color:black;
  font-size:12px;
  text-align:center;
  line-height:20px;
  top:10px;
  left:10px;
}

/* タイムライン */
.timeline{
  max-height:200px;
  overflow:auto;
}
.log-item{
  border-bottom:1px solid #333;
  padding:6px;
}
</style>
</head>

<body>

<header id="game-info">Loading...</header>

<div class="section" id="scoreboard"></div>

<div class="section">
<div class="count-board">
  <div class="count-group">B
    <div id="balls"></div>
  </div>
  <div class="count-group">S
    <div id="strikes"></div>
  </div>
  <div class="count-group">O
    <div id="outs"></div>
  </div>
</div>
</div>

<div class="section">
<h3>守備位置</h3>
<div class="field" id="field"></div>
</div>

<div class="section">
<h3>ストライクゾーン</h3>
<div class="zone" id="zone"></div>
</div>

<div class="section">
<h3>実況タイムライン</h3>
<div class="timeline" id="timeline"></div>
</div>

<script>
let gameData;
let currentAtBat=0;

async function loadGame(){
 const params=new URLSearchParams(location.search);
 const date=params.get("date");
 const team=params.get("team");
 const res=await fetch(`live/${date}_${team}.json`);
 gameData=await res.json();
 renderAll();
}

function renderAll(){
  if(!gameData || !gameData.at_bats || gameData.at_bats.length === 0){
    console.warn("打席データがありません");
    return;
  }

  if(currentIndex >= gameData.at_bats.length){
    currentIndex = gameData.at_bats.length - 1;
  }

  const ab = gameData.at_bats[currentIndex];
  if(!ab) return;

  renderGameInfo();
  renderScoreboard();
  renderField(ab);
  renderCount(ab);
  renderZone(ab);
  renderLog(ab);
}

function renderHeader(){
 const g=gameData.game_info;
 document.getElementById("game-info").innerText=
  `${g.away_team} vs ${g.home_team} ＠${g.stadium}`;
}

function renderScore(){
 const s=gameData.scoreboard;
 let html="<table class='score-table'><tr><th></th>";
 for(let i=1;i<=s.away.length;i++) html+=`<th>${i}</th>`;
 html+="<th>R</th><th>H</th><th>E</th></tr>";
 html+=`<tr><td>${gameData.game_info.away_team}</td>`;
 s.away.forEach(v=>html+=`<td>${v}</td>`);
 html+=`<td>${s.away.reduce((a,b)=>a+b,0)}</td>
        <td>${s.away_hits}</td><td>${s.away_errors}</td></tr>`;
 html+=`<tr><td>${gameData.game_info.home_team}</td>`;
 s.home.forEach(v=>html+=`<td>${v}</td>`);
 html+=`<td>${s.home.reduce((a,b)=>a+b,0)}</td>
        <td>${s.home_hits}</td><td>${s.home_errors}</td></tr></table>`;
 document.getElementById("scoreboard").innerHTML=html;
}

function renderCount(){

  if(!gameData.at_bats || !gameData.at_bats.length) return;

  const ab = gameData.at_bats[currentAtBat];
  if(!ab) return;

  // ★ countが無い場合の完全防御
  const c = ab.count || { b:0, s:0, o:0 };

  renderLights("balls",3,c.b ?? 0,"green");
  renderLights("strikes",2,c.s ?? 0,"yellow");
  renderLights("outs",2,c.o ?? 0,"red");
}

function renderLights(id,max,on,color){
 const el=document.getElementById(id);
 el.innerHTML="";
 for(let i=0;i<max;i++){
   const d=document.createElement("div");
   d.className="light";
   if(i<on) d.classList.add("on",color);
   el.appendChild(d);
 }
}

function renderField(){
 const ab=gameData.at_bats[currentAtBat];
 const f=document.getElementById("field");
 f.innerHTML="";

 // 塁
 ["first","second","third"].forEach(b=>{
  const div=document.createElement("div");
  div.className=`base ${b}`;
  div.innerText=ab.bases[b]||"";
  f.appendChild(div);
 });

 // 守備位置
 for(const pos in ab.field){
  const div=document.createElement("div");
  div.className=`pos ${pos}`;
  div.innerText=ab.field[pos];
  f.appendChild(div);
 }
}

function renderZone(){
 const zone=document.getElementById("zone");
 zone.innerHTML="";
 for(let y=1;y<=5;y++){
  for(let x=1;x<=5;x++){
   const cell=document.createElement("div");
   cell.className="cell";
   if(x>=2&&x<=4&&y>=2&&y<=4) cell.classList.add("strike");
   zone.appendChild(cell);
  }
 }
 const pitches=gameData.at_bats[currentAtBat].pitches;
 pitches.forEach((p,i)=>{
   const index=(p.y-1)*5+(p.x-1);
   const dot=document.createElement("div");
   dot.className="dot";
   dot.style.background=p.result==="strike"?"yellow":
                        p.result==="ball"?"green":"white";
   dot.innerText=i+1;
   zone.children[index].appendChild(dot);
 });
}

function renderTimeline(){
 const logs=gameData.at_bats[currentAtBat].log;
 const tl=document.getElementById("timeline");
 tl.innerHTML="";
 logs.forEach(l=>{
   tl.innerHTML+=`<div class="log-item">${l.time} - ${l.text}</div>`;
 });
}

loadGame();
</script>

</body>
</html>
