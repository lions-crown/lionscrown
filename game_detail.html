<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>一球速報</title>
<link rel="stylesheet" href="css/style.css">

<style>
  /* 投球ゾーンを 4×4 で表示 */
  #zone {
    position: relative;
    width: 240px;
    height: 240px;
    border: 2px solid #fff;
    margin-top: 10px;
  }
  .zoneCell {
    width: 50px;
    height: 50px;
    background: yellow;
    color: black;
    text-align: center;
    font-size: 12px;
    line-height: 50px;
    border: 1px solid #444;
    position: absolute;
  }
  .strike { background: #f44336; color: #fff; }
  .ball   { background: #2196f3; color: #fff; }
  .hit    { background: #4caf50; color: #fff; }
  .out    { background: #9e9e9e; color: #fff; }
</style>
  
</head>
<body>
<div class="game-detail">

<h1>一球速報</h1>

<!-- 試合概要 -->
<section>
  <h2>試合概要</h2>
  <div id="summary"></div>
</section>

<!-- スコアボード -->
<section>
  <h2>スコアボード</h2>
  <div id="scoreboard"></div>
</section>

<!-- オーダー -->
<section>
  <h2>オーダー</h2>
  <div class="lineups">
    <div>
      <h3>ホーム</h3>
      <div id="homeLineup"></div>
    </div>
    <div>
      <h3>ビジター</h3>
      <div id="awayLineup"></div>
    </div>
  </div>
</section>

<!-- 守備位置＋塁状況 -->
<section>
  <h2>守備配置・走者状況</h2>
  <div id="field"></div>
</section>

<!-- 投球ログ -->
<section>
  <h2>投球ログ</h2>
  <div>
    <button onclick="prevPA()">前打者</button>
    <button onclick="nextPA()">次打者</button>
  </div>
  <div id="zone"></div>
</section>

<!-- 投球検索 -->
<section>
  <h2>投球検索</h2>
  <select id="inningFilter"></select>
  <select id="batterFilter"></select>
  <button onclick="filterPitches()">検索</button>
  <div id="filterResult"></div>
</section>

<!-- 投手詳細 -->
<section>
  <h2>投手詳細</h2>
  <div id="pitcherStats"></div>
</section>

<!-- 打者詳細 -->
<section>
  <h2>打者詳細</h2>
  <div id="batterStats"></div>
</section>

<script src="js/game.js"></script>
</div>
</body>
</html>
