<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>一球速報</title>
<link rel="stylesheet" href="css/style.css">

<style>
:root {
  --zone-size: 300px;   /* ← ここを変えれば拡大縮小可能 */
}

#zone {
  position: relative;
  width: var(--zone-size);
  height: var(--zone-size);
  border: 2px solid white;
}

.zoneGrid {
  position: absolute;
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
}

.zoneGrid div {
  border: 1px solid #444;
}

.zoneGrid div.strikeZone {
  border: 1px solid #aaa;
}

.pitchMarker {
  position: absolute;
  width: 16px;
  height: 16px;
  font-size: 8px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: translate(-50%, -50%);
  border: 1px solid black;
}

/* 結果カラー */
.result-strike { background: yellow; color: black; }
.result-ball   { background: green;  color: white; }
.result-hit    { background: red;    color: white; }
.result-out    { background: gray;   color: white; }
</style>
  
</head>
<body>
<div class="game-detail">

<h1>一球速報</h1>

<!-- 試合概要 -->
<section>
  <h2>試合概要</h2>
  <div id="summary"></div>
</section>

<!-- スコアボード -->
<section>
  <h2>スコアボード</h2>
  <div id="scoreboard"></div>
</section>

<!-- オーダー -->
<section>
  <h2>オーダー</h2>
  <div class="lineups">
    <div>
      <h3>ホーム</h3>
      <div id="homeLineup"></div>
    </div>
    <div>
      <h3>ビジター</h3>
      <div id="awayLineup"></div>
    </div>
  </div>
</section>

<!-- 守備位置＋塁状況 -->
<section>
  <h2>守備配置・走者状況</h2>
  <div id="field"></div>
</section>

<!-- カウント表示 -->
<section>
  <h2>カウント</h2>
  <div id="countDisplay"></div>
</section>
  
<!-- 投球ログ -->
<section>
  <h2>投球ログ</h2>

  <div id="pitchLog"></div>

  <div id="countDisplay"></div>

  <div>
    <button onclick="prevPA()">前打者</button>
    <button onclick="nextPA()">次打者</button>
  </div>

  <div id="zone"></div>
</section>

<!-- 投球検索 -->
<section>
  <h2>投球検索</h2>
  <select id="inningFilter"></select>
  <select id="batterFilter"></select>
  <button onclick="filterPitches()">検索</button>
  <div id="filterResult"></div>
</section>

<!-- 投手詳細 -->
<section>
  <h2>投手詳細</h2>
  <div id="pitcherStats"></div>
</section>

<!-- 打者詳細 -->
<section>
  <h2>打者詳細</h2>
  <div id="batterStats"></div>
</section>

<script src="js/game.js"></script>
</div>
</body>
</html>
