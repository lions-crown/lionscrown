<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一球速報 | L-crown</title>
<link rel="stylesheet" href="css/game.css">
</head>
<body>

<div id="gameSummary"></div>

<div id="scoreboardWrap">
  <table id="scoreboard"></table>
</div>

<div id="lineupsWrap">
  <div id="homeLineup"></div>
  <div id="awayLineup"></div>
</div>

<div id="fieldWrap">
  <div id="defenseDiagram"></div>
  <div id="basesDiagram"></div>
</div>

<div id="plateNav">
  <button onclick="prevPA()">前打者</button>
  <span id="currentPAInfo"></span>
  <button onclick="nextPA()">次打者</button>
</div>

<div id="zoneWrap">
  <div id="zoneGrid"></div>
</div>

<div id="pitchLog"></div>

<div id="filterWrap">
  <h3>検索</h3>
  <select id="inningFilter"></select>
  <select id="batterFilter"></select>
  <select id="baseFilter">
    <option value="">塁状況</option>
    <option value="000">なし</option>
    <option value="100">一塁</option>
    <option value="010">二塁</option>
    <option value="001">三塁</option>
    <option value="110">一二塁</option>
    <option value="101">一三塁</option>
    <option value="011">二三塁</option>
    <option value="111">満塁</option>
  </select>
  <button onclick="applyFilter()">検索</button>
</div>

<div id="statsWrap">
  <h3>投手・打者詳細</h3>
  <div id="pitcherStats"></div>
  <div id="batterStats"></div>
</div>

<script src="js/game.js"></script>
<script src="js/render.js"></script>
<script src="js/filter.js"></script>
<script src="js/stats.js"></script>

</body>
</html>
